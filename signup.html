<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register – Waliko Car Hire</title>
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Poppins', sans-serif;
      background: #f0f4ff;
      color: #333;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ── */
    header {
      background: linear-gradient(135deg, #1464dd, #0d47a1);
      color: #fff;
      padding: 10px 20px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 3px 15px rgba(20,100,221,0.35);
    }

    header h1 { font-size: 1.2em; font-weight: 700; }

    nav { display: flex; flex-wrap: wrap; gap: 6px; }

    nav a {
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.25);
      color: #fff;
      padding: 7px 13px;
      border-radius: 25px;
      font-size: 0.78em;
      font-weight: 500;
      text-decoration: none;
      transition: all 0.2s;
    }

    nav a:hover { background: rgba(255,255,255,0.3); border-color: rgba(255,255,255,0.6); }

    /* ── MAIN ── */
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      overflow: hidden;
    }

    /* ── CARD ── */
    .card {
      background: #fff;
      border-radius: 14px;
      padding: 22px 20px;
      box-shadow: 0 3px 16px rgba(20,100,221,0.09);
      border: 1px solid rgba(20,100,221,0.07);
      animation: fadeIn 0.3s ease;
      width: 100%;
      max-width: 420px;
      max-height: calc(100vh - 100px);
      overflow-y: auto;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-header {
      text-align: center;
      margin-bottom: 14px;
    }

    .card-header h2 {
      font-size: 1.2em;
      font-weight: 700;
      color: #1464dd;
      margin-bottom: 4px;
    }

    .card-header p {
      font-size: 0.82em;
      color: #888;
    }

    /* ── FORM ── */
    .form-group { margin-bottom: 10px; }

    .form-group label {
      display: block;
      font-size: 0.8em;
      font-weight: 600;
      color: #444;
      margin-bottom: 4px;
    }

    .form-group input[type="text"],
    .form-group input[type="password"],
    .form-group input[type="email"],
    .form-group input[type="tel"] {
      width: 100%;
      padding: 9px 12px;
      border: 1.5px solid #dde3f0;
      border-radius: 8px;
      font-family: 'Poppins', sans-serif;
      font-size: 0.88em;
      outline: none;
      transition: border-color 0.2s;
      color: #333;
    }

    .form-group input:focus {
      border-color: #1464dd;
      box-shadow: 0 0 0 3px rgba(20,100,221,0.1);
    }

    /* Gender */
    .gender-options {
      display: flex;
      gap: 20px;
      margin-top: 6px;
    }

    .gender-options label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.88em;
      color: #444;
      font-weight: 500;
      cursor: pointer;
    }

    .gender-options input[type="radio"] {
      accent-color: #1464dd;
      width: 16px;
      height: 16px;
    }

    /* Terms */
    .terms-group {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      margin-bottom: 12px;
      font-size: 0.82em;
      color: #555;
      line-height: 1.5;
    }

    .terms-group input[type="checkbox"] {
      accent-color: #1464dd;
      width: 15px;
      height: 15px;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .terms-group a { color: #1464dd; font-weight: 600; text-decoration: none; }
    .terms-group a:hover { text-decoration: underline; }

    /* Submit */
    .btn-submit {
      width: 100%;
      padding: 11px;
      background: linear-gradient(135deg, #1464dd, #0d47a1);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: 'Poppins', sans-serif;
      font-size: 0.92em;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-submit:hover:not(:disabled) {
      background: linear-gradient(135deg, #0d47a1, #083080);
      transform: translateY(-1px);
    }

    .btn-submit:disabled { background: #aac4f5; cursor: not-allowed; transform: none; }

    /* Signin link */
    .signin-link {
      text-align: center;
      margin-top: 16px;
      font-size: 0.82em;
      color: #888;
    }

    .signin-link a { color: #1464dd; font-weight: 600; text-decoration: none; }
    .signin-link a:hover { text-decoration: underline; }

    @media (max-width: 600px) {
      header { gap: 8px; }
      header h1 { font-size: 1em; }
      nav a { font-size: 0.7em; padding: 6px 10px; }
      main { margin: 16px auto; }
      .card { padding: 22px 18px; }
    }
  </style>
</head>
<body>

  <header>
    <h1>🚗 Waliko Car Hire</h1>
    <nav>
      <a href="index.html">Home</a>
      <a href="signin.html">Sign In</a>
    </nav>
  </header>

  <main>
    <div class="card">
      <div class="card-header">
        <h2>Create Account</h2>
        <p>Register now for luxury car rentals!</p>
      </div>

      <form name="registrationForm" onsubmit="validateForm(event)">

        <div class="form-group">
          <label>Username</label>
          <input type="text" name="username" placeholder="Enter username" required>
        </div>

        <div class="form-group">
          <label>Password</label>
          <input type="password" name="password" placeholder="Enter password" required>
        </div>

        <div class="form-group">
          <label>Confirm Password</label>
          <input type="password" name="confirm_password" placeholder="Confirm password" required>
        </div>

        <div class="form-group">
          <label>Gender</label>
          <div class="gender-options">
            <label><input type="radio" name="gender" value="male" required> Male</label>
            <label><input type="radio" name="gender" value="female" required> Female</label>
          </div>
        </div>

        <div class="form-group">
          <label>Email</label>
          <input type="email" name="email" placeholder="Enter email" required>
        </div>

        <div class="form-group">
          <label>Phone Number</label>
          <input type="tel" name="phone" placeholder="07XXXXXXXX" required>
        </div>

        <div class="terms-group">
          <input type="checkbox" name="terms" required>
          <span>I agree to the <a href="#">Terms & Conditions</a> and <a href="#">Privacy Policy</a></span>
        </div>

        <button type="submit" class="btn-submit" id="submitBtn">Register</button>

        <div class="signin-link">
          Already have an account? <a href="signin.html">Sign In</a>
        </div>

      </form>
    </div>
  </main>

  <script>
    emailjs.init("K0G-_h4Z3_5F8jOmZ");

    function validateForm(event) {
      event.preventDefault();

      const form     = document.forms["registrationForm"];
      const submitBtn = document.getElementById('submitBtn');
      const password  = form["password"].value;
      const confirmPw = form["confirm_password"].value;
      const terms     = form["terms"].checked;
      const phone     = form["phone"].value;

      if (!terms) {
        alert("❌ You must agree to the terms and conditions to register."); return;
      }
      if (password !== confirmPw) {
        alert("❌ Passwords do not match!"); return;
      }
      if (!/^07\d{8}$/.test(phone)) {
        alert("❌ Phone number must start with 07 and be 10 digits."); return;
      }

      const username = form["username"].value;
      const email    = form["email"].value;
      const gender   = form["gender"].value;

      let allUsers = JSON.parse(localStorage.getItem("allUsers")) || [];

      if (allUsers.some(u => u.email === email)) {
        alert("❌ Email is already registered. Please use a different email."); return;
      }

      const code = Math.floor(100000 + Math.random() * 900000);
      localStorage.setItem("verificationCode", code);
      localStorage.setItem("userEmail", email);

      const newUser = { username, email, password, phone, gender, isVerified: false };
      allUsers.push(newUser);
      localStorage.setItem("allUsers", JSON.stringify(allUsers));

      submitBtn.disabled = true;
      submitBtn.textContent = "Sending...";

      emailjs.send("service_mne9prb", "template_5bztsmi", { to_email: email, verification_code: code })
        .then(() => {
          alert("✅ Verification code sent to your email!");
          window.location.href = "verify.html";
        })
        .catch(error => {
          alert("❌ Failed to send email: " + error.text);
          submitBtn.disabled = false;
          submitBtn.textContent = "Register";
        });
    }
  </script>

</body>
</html>

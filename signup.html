<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Waliko Car Hire - Register</title>
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: 'Poppins', sans-serif;
      background: #f0f4ff;
    }

    .container {
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding-top: 20px;
    }

    .wrapper {
      background: #fff;
      padding: 24px 22px;
      border-radius: 14px;
      box-shadow: 0 3px 16px rgba(20,100,221,0.12);
      border: 1px solid rgba(20,100,221,0.08);
      width: 90%;
      max-width: 380px;
    }

    h1 {
      text-align: center;
      color: #1464dd;
      margin-bottom: 4px;
      font-size: 1.2em;
      font-weight: 700;
    }

    p {
      text-align: center;
      color: #888;
      font-size: 0.8em;
      margin-bottom: 14px;
    }

    label {
      display: block;
      margin-top: 10px;
      font-size: 0.8em;
      font-weight: 600;
      color: #444;
    }

    input[type="text"],
    input[type="password"],
    input[type="email"],
    input[type="tel"] {
      width: 100%;
      padding: 9px 12px;
      border: 1.5px solid #dde3f0;
      border-radius: 8px;
      margin-top: 4px;
      font-family: 'Poppins', sans-serif;
      font-size: 0.88em;
      outline: none;
      transition: border-color 0.2s;
      color: #333;
    }

    input[type="text"]:focus,
    input[type="password"]:focus,
    input[type="email"]:focus,
    input[type="tel"]:focus {
      border-color: #1464dd;
      box-shadow: 0 0 0 3px rgba(20,100,221,0.1);
    }

    .gender-options {
      display: flex;
      gap: 20px;
      margin-top: 6px;
      font-size: 0.88em;
    }

    .gender-options label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-weight: 500;
      color: #444;
      cursor: pointer;
      margin-top: 0;
    }

    input[type="radio"] {
      accent-color: #1464dd;
      width: 15px;
      height: 15px;
    }

    input[type="checkbox"] {
      accent-color: #1464dd;
      width: 14px;
      height: 14px;
      margin-right: 6px;
    }

    .terms {
      font-size: 0.8em;
      margin-top: 12px;
      color: #555;
    }

    .terms label {
      display: flex;
      align-items: flex-start;
      gap: 6px;
      font-weight: 400;
      margin-top: 0;
      line-height: 1.5;
    }

    input[type="submit"] {
      width: 100%;
      padding: 11px;
      background: linear-gradient(135deg, #1464dd, #0d47a1);
      color: #fff;
      border: none;
      border-radius: 8px;
      margin-top: 14px;
      margin-bottom: 8px;
      font-family: 'Poppins', sans-serif;
      font-weight: 600;
      font-size: 0.92em;
      cursor: pointer;
      transition: all 0.2s;
    }

    input[type="submit"]:hover {
      background: linear-gradient(135deg, #0d47a1, #083080);
      transform: translateY(-1px);
    }

    input[type="submit"]:disabled {
      background: #aac4f5;
      cursor: not-allowed;
      transform: none;
    }

    .signin-link {
      text-align: center;
      font-size: 0.8em;
      color: #888;
      margin-top: 8px;
    }

    a {
      color: #1464dd;
      text-decoration: none;
      font-weight: 600;
    }

    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="wrapper">
      <form name="registrationForm" onsubmit="validateForm(event)">
        <h1>Waliko Car Hire</h1>
        <p>Register now for luxury car rentals!</p>

        <label>Username:</label>
        <input type="text" name="username" placeholder="Enter username" required>

        <label>Password:</label>
        <input type="password" name="password" placeholder="Enter password" required>

        <label>Confirm Password:</label>
        <input type="password" name="confirm_password" placeholder="Confirm password" required>

        <label>Gender:</label>
        <div class="gender-options">
          <label><input type="radio" name="gender" value="male" required> Male</label>
          <label><input type="radio" name="gender" value="female" required> Female</label>
        </div>

        <label>Email:</label>
        <input type="email" name="email" placeholder="Enter email" required>

        <label>Phone No:</label>
        <input type="tel" name="phone" placeholder="07XXXXXXXX" required>

        <div class="terms">
          <label><input type="checkbox" name="terms" required> I agree to the
            <a href="#">terms & conditions</a> and
            <a href="#">privacy policy</a></label>
        </div>

        <input type="submit" value="Register">

        <div class="signin-link">
          <p>Already have an account? <a href="signin.html">Sign In</a></p>
        </div>
      </form>
    </div>
  </div>

  <script>
    emailjs.init("K0G-_h4Z3_5F8jOmZ");

    function validateForm(event) {
      event.preventDefault();

      const form = document.forms["registrationForm"];
      const submitBtn = form.querySelector('input[type="submit"]');
      const password = form["password"].value;
      const confirmPassword = form["confirm_password"].value;
      const termsAccepted = form["terms"].checked;
      const phone = form["phone"].value;

      if (!termsAccepted) {
        alert("❌ You must agree to the terms and conditions to register.");
        return;
      }

      if (password !== confirmPassword) {
        alert("❌ Passwords do not match!");
        return;
      }

      if (!/^07\d{8}$/.test(phone)) {
        alert("❌ Phone number must start with 07 and be 10 digits.");
        return;
      }

      const username = form["username"].value;
      const email = form["email"].value;
      const gender = form["gender"].value;

      let allUsers = JSON.parse(localStorage.getItem("allUsers")) || [];

      const userExists = allUsers.some(user => user.email === email);
      if (userExists) {
        alert("❌ Email is already registered. Please use a different email.");
        return;
      }

      const code = Math.floor(100000 + Math.random() * 900000);
      localStorage.setItem("verificationCode", String(code));
      localStorage.setItem("verificationExpiry", String(Date.now() + 5 * 60 * 1000));
      localStorage.setItem("userEmail", email);

      const newUser = {
        username,
        email,
        password,
        phone,
        gender,
        isVerified: false
      };
      allUsers.push(newUser);
      localStorage.setItem("allUsers", JSON.stringify(allUsers));

      const templateParams = {
        to_email: email,
        verification_code: code
      };

      submitBtn.disabled = true;
      submitBtn.value = "Sending...";

      emailjs.send("service_mne9prb", "template_5bztsmi", templateParams)
        .then(() => {
          alert("✅ Verification code sent to your email!");
          window.location.href = "verify.html";
        })
        .catch((error) => {
          alert("❌ Failed to send email: " + error.text);
          submitBtn.disabled = false;
          submitBtn.value = "Register";
        });
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Bookings – Waliko Car Hire</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Poppins', sans-serif; background: #f0f4ff; color: #333; min-height: 100vh; }

    /* ── HEADER ── */
    header {
      background: linear-gradient(135deg, #1464dd, #0d47a1);
      color: #fff; padding: 10px 20px;
      display: flex; flex-wrap: wrap; align-items: center;
      justify-content: space-between; position: sticky; top: 0;
      z-index: 100; box-shadow: 0 3px 15px rgba(20,100,221,0.35);
    }
    header h1 { font-size: 1.2em; font-weight: 700; }
    nav { display: flex; flex-wrap: wrap; gap: 6px; }
    nav a {
      background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.25);
      color: #fff; padding: 7px 13px; border-radius: 25px;
      font-size: 0.78em; font-weight: 500; text-decoration: none; transition: all 0.2s;
    }
    nav a:hover, nav a.active { background: rgba(255,255,255,0.3); border-color: rgba(255,255,255,0.6); }
    nav a.logout { border-color: rgba(255,100,100,0.4); color: #ffaaaa; }
    nav a.logout:hover { background: rgba(255,80,80,0.2); }

    /* ── MAIN ── */
    main { max-width: 860px; margin: 28px auto; padding: 0 16px 60px; }

    .page-title {
      font-size: 1.3em; font-weight: 700; color: #1464dd;
      margin-bottom: 6px; display: flex; align-items: center; gap: 8px;
    }
    .page-subtitle { font-size: 0.82em; color: #888; margin-bottom: 20px; }

    /* ── EMPTY ── */
    .empty-msg {
      background: #fff; border-radius: 16px; padding: 48px 24px; text-align: center;
      box-shadow: 0 4px 20px rgba(20,100,221,0.08); border: 1px solid rgba(20,100,221,0.07);
      color: #666; font-size: 0.92em; line-height: 1.8;
    }
    .empty-msg .empty-icon { font-size: 3em; margin-bottom: 12px; }
    .empty-msg a { color: #1464dd; font-weight: 600; text-decoration: none; }

    /* ── BOOKING CARD ── */
    .booking-card {
      background: #fff; border-radius: 16px; margin-bottom: 20px;
      box-shadow: 0 4px 20px rgba(20,100,221,0.08);
      border: 1px solid rgba(20,100,221,0.09);
      overflow: hidden; animation: fadeIn 0.35s ease;
    }
    @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

    /* card top bar */
    .card-topbar {
      background: linear-gradient(135deg, #1464dd, #0d47a1);
      padding: 14px 20px;
      display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;
    }
    .card-topbar-left h3 { font-size: 1em; font-weight: 700; color: #fff; }
    .card-topbar-left .booking-id { font-size: 0.72em; color: rgba(255,255,255,0.65); margin-top: 2px; }
    .card-topbar-right { display: flex; gap: 8px; flex-wrap: wrap; }

    /* status badge in topbar */
    .badge {
      padding: 4px 10px; border-radius: 20px; font-size: 0.7em; font-weight: 700; letter-spacing: 0.3px;
    }
    .badge-paid { background: #27ae60; color: #fff; }
    .badge-pending { background: #f39c12; color: #fff; }

    /* card body */
    .card-body { padding: 20px; }

    /* ── INFO TABLE ── */
    .info-table {
      width: 100%; border-collapse: collapse; margin-bottom: 16px;
      border-radius: 10px; overflow: hidden; border: 1px solid #e8edf8;
    }
    .info-table thead tr { background: #f0f4ff; }
    .info-table thead th {
      text-align: left; font-size: 0.72em; font-weight: 700;
      color: #1464dd; padding: 10px 14px; text-transform: uppercase; letter-spacing: 0.4px;
    }
    .info-table tbody tr { border-bottom: 1px solid #f0f4ff; transition: background 0.15s; }
    .info-table tbody tr:last-child { border-bottom: none; }
    .info-table tbody tr:hover { background: #f8faff; }
    .info-table tbody td {
      padding: 9px 14px; font-size: 0.85em; color: #333;
    }
    .info-table tbody td:first-child {
      font-weight: 600; color: #555; width: 160px; white-space: nowrap;
    }
    .info-table tbody td.highlight { font-weight: 700; color: #1464dd; }
    .info-table tbody td.total-row { font-weight: 700; color: #1a1a2e; font-size: 0.9em; }

    /* section label */
    .section-label {
      font-size: 0.72em; font-weight: 700; color: #1464dd;
      text-transform: uppercase; letter-spacing: 0.5px;
      margin-bottom: 8px; margin-top: 4px;
      display: flex; align-items: center; gap: 6px;
    }
    .section-label::after {
      content: ''; flex: 1; height: 1px; background: #e0eaff;
    }

    /* ── STATUS BOX ── */
    .status-box {
      border-radius: 10px; padding: 12px 16px; font-size: 0.82em;
      margin-bottom: 16px; line-height: 1.7; display: flex; align-items: flex-start; gap: 10px;
    }
    .status-box .status-icon { font-size: 1.3em; flex-shrink: 0; margin-top: 1px; }
    .status-pending { background:#fff8ee; border:1px solid #ffd78a; border-left:4px solid #f39c12; color:#905000; }
    .status-success { background:#f0fff6; border:1px solid #a8f0c6; border-left:4px solid #27ae60; color:#1a6e3a; }

    /* ── CARD FOOTER ── */
    .card-footer {
      padding: 14px 20px; background: #f8faff;
      border-top: 1px solid #eef2fc;
      display: flex; gap: 8px; justify-content: space-between; align-items: center; flex-wrap: wrap;
    }
    .card-footer-left { display: flex; gap: 8px; flex-wrap: wrap; }
    .card-footer-right { display: flex; gap: 8px; flex-wrap: wrap; }

    /* ── BUTTONS ── */
    .btn {
      padding: 8px 16px; border: none; border-radius: 8px;
      font-family: 'Poppins', sans-serif; font-size: 0.78em; font-weight: 600;
      cursor: pointer; transition: all 0.2s; display: inline-flex; align-items: center; gap: 5px;
    }
    .btn-pay { background: linear-gradient(135deg,#1464dd,#0d47a1); color: #fff; box-shadow: 0 2px 8px rgba(20,100,221,0.25); }
    .btn-pay:hover { background: linear-gradient(135deg,#0d47a1,#083080); transform: translateY(-1px); }
    .btn-delete { background: #fff0f0; color: #c0392b; border: 1px solid #ffcccc; }
    .btn-delete:hover { background: #ffe0e0; }
    .btn-pdf { background: #fff; color: #1464dd; border: 1.5px solid #c5d5f5; }
    .btn-pdf:hover { background: #f0f4ff; }

    /* ── SHOW MORE ── */
    .show-more-btn {
      display: block; width: 100%; padding: 13px; background: #fff;
      border: 1.5px dashed #c5d5f5; border-radius: 12px;
      font-family: 'Poppins', sans-serif; font-size: 0.88em; font-weight: 600;
      color: #1464dd; cursor: pointer; transition: all 0.2s; margin-top: 4px; text-align: center;
    }
    .show-more-btn:hover { background: #f0f4ff; border-color: #1464dd; }

    /* ── RESPONSIVE ── */
    @media (max-width: 700px) {
      header { flex-direction: column; align-items: flex-start; gap: 8px; }
      nav { margin-top: 4px; width: 100%; }
      header h1 { font-size: 1em; }
      nav a { font-size: 0.7em; padding: 6px 10px; }
      .card-topbar { flex-direction: column; align-items: flex-start; }
      .info-table tbody td:first-child { width: 110px; font-size: 0.78em; }
      .info-table tbody td { font-size: 0.8em; word-break: break-word; }
      .card-footer { flex-direction: column; align-items: stretch; }
      .card-footer-left, .card-footer-right { width: 100%; }
      .btn { flex: 1; justify-content: center; }
      main { padding: 0 10px 40px; }
    }
  </style>
</head>
<body>
  <header>
    <h1>🚗 Waliko Car Hire</h1>
    <nav>
      <a href="car-available.html">Home</a>
      <a href="car-available.html">Cars</a>
      <a href="bookings.html" class="active">My Bookings</a>
      <a href="payments.html">Payments</a>
      <a href="help.html">Help</a>
      <a href="account.html">Settings</a>
      <a href="feedback.html">Feedback</a>
      <a href="index.html" class="logout" id="logoutBtn">Logout</a>
    </nav>
  </header>

  <main>
    <div class="page-title">📋 My Bookings</div>
    <div class="page-subtitle">View and manage all your car hire bookings below.</div>
    <div id="bookingsList"></div>
  </main>

  <script>
    let displayCount = 3;

    function renderBookings() {
      const list = document.getElementById('bookingsList');
      list.innerHTML = '';
      const bookings = JSON.parse(localStorage.getItem('bookings')) || [];

      if (bookings.length === 0) {
        list.innerHTML = `
          <div class="empty-msg">
            <div class="empty-icon">🚗</div>
            <p><strong>No bookings yet!</strong></p>
            <p style="margin-top:6px">Go to <a href="car-available.html">Cars</a> to browse and book a vehicle.</p>
          </div>`;
        return;
      }

      bookings.slice(0, displayCount).forEach((b, idx) => {
        // Normalize: if receipt exists treat as paid regardless of paymentStatus field
        if (b.mpesaReceipt && b.mpesaReceipt !== 'N/A') b.paymentStatus = 'paid';

        const days    = Math.max(1, Math.ceil((new Date(b.endDate) - new Date(b.pickup)) / 86400000));
        const total   = b.price * days;
        const deposit = Math.floor(total / 2);
        const balance = total - deposit;
        const isPaid  = b.paymentStatus === 'paid';

        const statusHTML = isPaid
          ? `<div class="status-box status-success">
              <span class="status-icon">✅</span>
              <div><strong>Deposit Paid!</strong> M-Pesa Receipt: <strong>${b.mpesaReceipt || 'N/A'}</strong><br>
              Your booking is confirmed. Balance of <strong>Ksh ${balance.toLocaleString()}</strong> is due at pickup. 🚗</div>
             </div>`
          : `<div class="status-box status-pending">
              <span class="status-icon">⏳</span>
              <div><strong>Pending Payment</strong><br>
              Pay a deposit of <strong>Ksh ${deposit.toLocaleString()}</strong> to confirm your booking.
              Remaining <strong>Ksh ${balance.toLocaleString()}</strong> is paid at pickup.</div>
             </div>`;

        const card = document.createElement('div');
        card.className = 'booking-card';
        card.innerHTML = `
          <!-- Top Bar -->
          <div class="card-topbar">
            <div class="card-topbar-left">
              <h3>🚘 ${b.carName}</h3>
              <div class="booking-id">Booking ID: ${b.bookingId} &nbsp;·&nbsp; ${b.timestamp}</div>
            </div>
            <div class="card-topbar-right">
              <span class="badge ${isPaid ? 'badge-paid' : 'badge-pending'}">${isPaid ? '✓ Paid' : '⏳ Pending'}</span>
            </div>
          </div>

          <!-- Body -->
          <div class="card-body">

            <!-- Customer Info -->
            <div class="section-label">Customer Details</div>
            <table class="info-table">
              <tbody>
                <tr><td>Full Name</td><td>${b.fullName}</td></tr>
                <tr><td>Phone No.</td><td>${b.phone}</td></tr>
                <tr><td>National ID</td><td>${b.nationalId}</td></tr>
                <tr><td>Licence No.</td><td>${b.license}</td></tr>
              </tbody>
            </table>

            <!-- Booking Info -->
            <div class="section-label">Booking Details</div>
            <table class="info-table">
              <tbody>
                <tr><td>Start Date</td><td>${b.pickup}</td></tr>
                <tr><td>End Date</td><td>${b.endDate}</td></tr>
                <tr><td>Days Booked</td><td class="highlight">${days} day${days !== 1 ? 's' : ''}</td></tr>
                <tr><td>Price / Day</td><td>Ksh ${b.price.toLocaleString()}</td></tr>
                <tr><td>Deposit (50%)</td><td>Ksh ${deposit.toLocaleString()}</td></tr>
                <tr><td>Balance at Pickup</td><td>Ksh ${balance.toLocaleString()}</td></tr>
                <tr><td>Total Fee</td><td class="total-row">Ksh ${total.toLocaleString()}</td></tr>
              </tbody>
            </table>

            ${statusHTML}
          </div>

          <!-- Footer -->
          <div class="card-footer">
            <div class="card-footer-left">
              ${!isPaid ? `<button class="btn btn-pay" data-amount="${deposit}" data-id="${b.bookingId}">💳 Pay Deposit</button>` : ''}
              <button class="btn btn-delete" data-idx="${idx}">🗑 Delete</button>
            </div>
            <div class="card-footer-right">
              <button class="btn btn-pdf" data-idx="${idx}">⬇ Download PDF</button>
            </div>
          </div>
        `;
        list.appendChild(card);
      });

      if (bookings.length > displayCount) {
        const btn = document.createElement('button');
        btn.className = 'show-more-btn';
        btn.textContent = `↓ Show More (${bookings.length - displayCount} remaining)`;
        btn.addEventListener('click', () => { displayCount += 5; renderBookings(); });
        list.appendChild(btn);
      }

      // Pay buttons
      list.querySelectorAll('.btn-pay').forEach(btn => {
        btn.addEventListener('click', () => {
          localStorage.setItem('paymentAmount', btn.dataset.amount);
          localStorage.setItem('paymentBookingId', btn.dataset.id);
          window.location.href = 'payment-gateway.html';
        });
      });

      // Delete buttons
      list.querySelectorAll('.btn-delete').forEach(btn => {
        btn.addEventListener('click', () => {
          if (confirm('Are you sure you want to delete this booking?')) {
            const bookings = JSON.parse(localStorage.getItem('bookings')) || [];
            bookings.splice(Number(btn.dataset.idx), 1);
            localStorage.setItem('bookings', JSON.stringify(bookings));
            renderBookings();
          }
        });
      });

      // PDF buttons — pass index directly so no ID type mismatch ever happens
      list.querySelectorAll('.btn-pdf').forEach(btn => {
        btn.addEventListener('click', () => downloadPDF(Number(btn.dataset.idx)));
      });
    }

    // ── PDF GENERATION ──
    function downloadPDF(idx) {
      const bookings = JSON.parse(localStorage.getItem('bookings')) || [];
      const b = bookings[idx];
      if (!b) { alert('Booking not found.'); return; }

      // ── SINGLE SOURCE OF TRUTH FOR PAID STATUS ──
      // Paid = has a real receipt OR paymentStatus is 'paid'
      const receipt = (b.mpesaReceipt && b.mpesaReceipt.trim() !== '' && b.mpesaReceipt !== 'N/A')
                      ? b.mpesaReceipt.trim() : null;
      const isPaid  = receipt !== null || b.paymentStatus === 'paid';
      const paidAt  = b.paidAt || 'N/A';

      const days    = Math.max(1, Math.ceil((new Date(b.endDate) - new Date(b.pickup)) / 86400000));
      const total   = b.price * days;
      const deposit = Math.floor(total / 2);
      const balance = total - deposit;

      const { jsPDF } = window.jspdf;
      const pdf = new jsPDF({ unit: 'mm', format: 'a4' });
      const W = 210, H = 297, L = 14, R = 196, CW = 182;

      // ── HEADER ──
      pdf.setFillColor(20, 100, 221);
      pdf.rect(0, 0, W, 34, 'F');
      pdf.setTextColor(255, 255, 255);
      pdf.setFontSize(20); pdf.setFont('helvetica', 'bold');
      pdf.text('WALIKO CAR HIRE', L, 15);
      pdf.setFontSize(7); pdf.setFont('helvetica', 'normal');
      pdf.setTextColor(200, 220, 255);
      pdf.text('235 Fashion Street, Nairobi  |  0790 337 687  |  walik@gmail.com', L, 22);
      pdf.setFontSize(8); pdf.setTextColor(255, 255, 255); pdf.setFont('helvetica', 'bold');
      pdf.text('BOOKING CONFIRMATION', L, 30);

      // ── STATUS BADGE — driven by isPaid ──
      if (isPaid) {
        pdf.setFillColor(39, 174, 96);
      } else {
        pdf.setFillColor(243, 156, 18);
      }
      pdf.roundedRect(146, 9, 50, 14, 3, 3, 'F');
      pdf.setFontSize(8); pdf.setFont('helvetica', 'bold');
      pdf.setTextColor(255, 255, 255);
      pdf.text(isPaid ? 'DEPOSIT PAID' : 'PENDING PAYMENT', 171, 18, { align: 'center' });

      let y = 42;

      // ── BOOKING ID BOX ──
      pdf.setFillColor(240, 245, 255);
      pdf.roundedRect(L, y, CW, 14, 2, 2, 'F');
      pdf.setDrawColor(20, 100, 221); pdf.setLineWidth(0.3);
      pdf.roundedRect(L, y, CW, 14, 2, 2, 'S');
      pdf.setTextColor(80, 100, 160); pdf.setFontSize(6.5); pdf.setFont('helvetica', 'bold');
      pdf.text('BOOKING ID', L + 5, y + 5.5);
      pdf.setTextColor(10, 30, 100); pdf.setFontSize(12); pdf.setFont('helvetica', 'bold');
      pdf.text(String(b.bookingId), L + 5, y + 11.5);
      pdf.setTextColor(140, 140, 150); pdf.setFontSize(7); pdf.setFont('helvetica', 'normal');
      pdf.text('Date: ' + b.timestamp, R - 2, y + 11.5, { align: 'right' });
      y += 20;

      // ── ROW HELPER ──
      function row(label, value, opts) {
        opts = opts || {};
        const bg   = opts.bg   || [255, 255, 255];
        const lc   = opts.lc   || [90, 90, 115];
        const vc   = opts.vc   || [20, 20, 40];
        const bold = opts.bold || false;
        pdf.setFillColor(bg[0], bg[1], bg[2]);
        pdf.rect(L, y, CW, 9, 'F');
        pdf.setDrawColor(228, 234, 248); pdf.setLineWidth(0.18);
        pdf.rect(L, y, CW, 9, 'S');
        pdf.setFillColor(20, 100, 221);
        pdf.rect(L, y, 3, 9, 'F');
        pdf.setTextColor(lc[0], lc[1], lc[2]); pdf.setFontSize(7.5); pdf.setFont('helvetica', 'bold');
        pdf.text(label, L + 7, y + 6);
        pdf.setTextColor(vc[0], vc[1], vc[2]); pdf.setFont('helvetica', bold ? 'bold' : 'normal');
        pdf.text(String(value), R - 2, y + 6, { align: 'right' });
        y += 9;
      }

      function sectionHeader(title) {
        y += 2;
        pdf.setFillColor(20, 100, 221);
        pdf.rect(L, y, CW, 9, 'F');
        pdf.setTextColor(255, 255, 255); pdf.setFontSize(7.5); pdf.setFont('helvetica', 'bold');
        pdf.text(title, L + 5, y + 6);
        y += 9;
      }

      // ── CUSTOMER DETAILS ──
      sectionHeader('CUSTOMER DETAILS');
      row('Full Name',   b.fullName,   { bg: [250, 252, 255] });
      row('Phone',       b.phone,      { bg: [255, 255, 255] });
      row('National ID', b.nationalId, { bg: [250, 252, 255] });
      row('Licence No.', b.license,    { bg: [255, 255, 255] });

      // ── VEHICLE & BOOKING ──
      sectionHeader('VEHICLE & BOOKING');
      row('Vehicle',          b.carName,                               { bg: [250, 252, 255] });
      row('Pickup Date',      b.pickup,                                { bg: [255, 255, 255] });
      row('Return Date',      b.endDate,                               { bg: [250, 252, 255] });
      row('Duration',         days + ' day' + (days !== 1 ? 's' : ''), { bg: [255, 255, 255] });
      row('Daily Rate',       'Ksh ' + b.price.toLocaleString(),       { bg: [250, 252, 255] });

      // ── PAYMENT SUMMARY ──
      sectionHeader('PAYMENT SUMMARY');
      row('Total Rental Cost',
          'Ksh ' + total.toLocaleString(),
          { bg: [228, 240, 255], lc: [20, 60, 160], vc: [20, 60, 160], bold: true });
      row('Deposit (50%)',
          'Ksh ' + deposit.toLocaleString(),
          {
            bg:   isPaid ? [220, 255, 235] : [255, 248, 220],
            lc:   isPaid ? [15, 110, 55]   : [130, 75, 0],
            vc:   isPaid ? [15, 110, 55]   : [130, 75, 0],
            bold: true
          });
      row('Balance Due at Pickup',
          'Ksh ' + balance.toLocaleString(),
          { bg: [255, 255, 255], lc: [100, 100, 120], vc: [20, 20, 40] });

      // ── M-PESA RECEIPT (only if paid) ──
      if (isPaid) {
        sectionHeader('M-PESA PAYMENT DETAILS');
        row('Receipt No.',    receipt || 'N/A',                    { bg: [220, 255, 235], lc: [15, 110, 55], vc: [15, 110, 55], bold: true });
        row('Amount Paid',    'Ksh ' + deposit.toLocaleString(),   { bg: [240, 255, 248], lc: [15, 110, 55], vc: [15, 110, 55], bold: true });
        row('Payment Date',   paidAt,                              { bg: [220, 255, 235], lc: [15, 110, 55], vc: [20, 20, 40] });
        row('Payment Status', 'CONFIRMED',                         { bg: [200, 255, 225], lc: [15, 110, 55], vc: [15, 110, 55], bold: true });
      }

      // ── NOTE BOX — isPaid controls everything ──
      y += 6;
      const noteText = isPaid
        ? 'Payment confirmed! You paid Ksh ' + deposit.toLocaleString() + ' deposit. Present this document at pickup. Remaining balance of Ksh ' + balance.toLocaleString() + ' is due at pickup.'
        : 'Please pay your deposit of Ksh ' + deposit.toLocaleString() + ' to confirm this booking. The remaining Ksh ' + balance.toLocaleString() + ' is paid at pickup.';

      const noteBg     = isPaid ? [235, 255, 244] : [255, 249, 230];
      const noteBorder = isPaid ? [39, 174, 96]   : [243, 156, 18];
      const noteTextC  = isPaid ? [15, 90, 45]    : [100, 65, 0];

      pdf.setFillColor(noteBg[0], noteBg[1], noteBg[2]);
      pdf.setDrawColor(noteBorder[0], noteBorder[1], noteBorder[2]);
      pdf.setLineWidth(0.4);
      pdf.roundedRect(L, y, CW, 18, 3, 3, 'FD');
      pdf.setFillColor(noteBorder[0], noteBorder[1], noteBorder[2]);
      pdf.roundedRect(L, y, 4, 18, 2, 2, 'F');
      pdf.setTextColor(noteTextC[0], noteTextC[1], noteTextC[2]);
      pdf.setFontSize(7.2); pdf.setFont('helvetica', 'normal');
      const lines = pdf.splitTextToSize(noteText, CW - 16);
      pdf.text(lines, L + 9, y + 7);
      y += 26;

      // ── SIGNATURES ──
      pdf.setDrawColor(200, 200, 215); pdf.setLineWidth(0.3);
      pdf.line(L, y + 14, L + 78, y + 14);
      pdf.line(L + 104, y + 14, R, y + 14);
      pdf.setTextColor(170, 170, 185); pdf.setFontSize(6.5); pdf.setFont('helvetica', 'normal');
      pdf.text('Customer Signature', L, y + 19);
      pdf.text('Authorized by Waliko Car Hire', L + 104, y + 19);

      // ── FOOTER ──
      pdf.setFillColor(20, 100, 221); pdf.rect(0, H - 18, W, 18, 'F');
      pdf.setFillColor(13, 71, 161); pdf.rect(0, H - 18, W, 3, 'F');

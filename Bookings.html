<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Bookings – Waliko Car Hire</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Poppins', sans-serif; background: #f0f4ff; color: #333; }
    header {
      background: linear-gradient(135deg, #1464dd, #0d47a1);
      color: #fff; padding: 10px 20px;
      display: flex; flex-wrap: wrap; align-items: center;
      justify-content: space-between; position: sticky; top: 0;
      z-index: 100; box-shadow: 0 3px 15px rgba(20,100,221,0.35);
    }
    header h1 { font-size: 1.2em; font-weight: 700; }
    nav { display: flex; flex-wrap: wrap; gap: 6px; }
    nav a {
      background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.25);
      color: #fff; padding: 7px 13px; border-radius: 25px;
      font-size: 0.78em; font-weight: 500; text-decoration: none; transition: all 0.2s;
    }
    nav a:hover, nav a.active { background: rgba(255,255,255,0.3); border-color: rgba(255,255,255,0.6); }
    nav a.logout { border-color: rgba(255,100,100,0.4); color: #ffaaaa; }
    nav a.logout:hover { background: rgba(255,80,80,0.2); }
    main { max-width: 900px; margin: 24px auto; padding: 0 16px 40px; }
    .page-title { font-size: 1.2em; font-weight: 700; color: #1464dd; margin-bottom: 16px; }
    .empty-msg {
      background: #fff; border-radius: 14px; padding: 32px 24px; text-align: center;
      box-shadow: 0 3px 16px rgba(20,100,221,0.09); border: 1px solid rgba(20,100,221,0.07);
      color: #666; font-size: 0.92em; line-height: 1.7;
    }
    .empty-msg a { color: #1464dd; font-weight: 600; text-decoration: none; }
    .booking-card {
      background: #fff; border-radius: 14px; padding: 20px; margin-bottom: 16px;
      box-shadow: 0 3px 16px rgba(20,100,221,0.09);
      border: 1px solid rgba(20,100,221,0.07); animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    .card-header {
      display: flex; justify-content: space-between;
      align-items: flex-start; gap: 12px; margin-bottom: 14px; flex-wrap: wrap;
    }
    .card-header h3 { font-size: 1em; font-weight: 700; color: #1a1a2e; }
    .card-header .booking-id { font-size: 0.75em; color: #888; margin-top: 2px; }
    .card-actions { display: flex; gap: 8px; flex-shrink: 0; }
    .btn {
      padding: 7px 14px; border: none; border-radius: 8px;
      font-family: 'Poppins', sans-serif; font-size: 0.78em; font-weight: 600; cursor: pointer; transition: all 0.2s;
    }
    .btn-pay { background: #1464dd; color: #fff; }
    .btn-pay:hover { background: #0d47a1; }
    .btn-delete { background: #fff0f0; color: #c0392b; border: 1px solid #ffcccc; }
    .btn-delete:hover { background: #ffe0e0; }
    .btn-pdf { background: #f0f4ff; color: #1464dd; border: 1px solid #c5d5f5; }
    .btn-pdf:hover { background: #e0eaff; }
    .info-table { width: 100%; border-collapse: collapse; margin-bottom: 14px; }
    .info-table tr { border-bottom: 1px solid #f0f4ff; }
    .info-table tr:last-child { border-bottom: none; }
    .info-table th { text-align: left; font-size: 0.78em; font-weight: 600; color: #888; padding: 6px 8px 6px 0; width: 140px; white-space: nowrap; }
    .info-table td { font-size: 0.85em; color: #333; padding: 6px 8px 6px 0; }
    .status-box { border-radius: 8px; padding: 10px 14px; font-size: 0.8em; margin-bottom: 12px; line-height: 1.6; }
    .status-pending { background:#fff5e6; border:1px solid #ffc87a; border-left:4px solid #f39c12; color:#b35c00; }
    .status-success { background:#f0fff4; border:1px solid #b2f5c8; border-left:4px solid #27ae60; color:#1a6e3a; }
    .card-footer { display: flex; gap: 8px; justify-content: flex-end; flex-wrap: wrap; }
    .show-more-btn {
      display: block; width: 100%; padding: 11px; background: #fff;
      border: 1.5px solid #c5d5f5; border-radius: 10px; font-family: 'Poppins', sans-serif;
      font-size: 0.88em; font-weight: 600; color: #1464dd; cursor: pointer; transition: all 0.2s; margin-top: 4px;
    }
    .show-more-btn:hover { background: #f0f4ff; }
    @media (max-width: 700px) {
      header { flex-direction: column; align-items: flex-start; gap: 8px; }
      nav { margin-top: 4px; width: 100%; }
      header h1 { font-size: 1em; }
      nav a { font-size: 0.7em; padding: 6px 10px; }
      .card-header { flex-direction: column; gap: 10px; }
      .card-actions { display: flex; flex-wrap: wrap; gap: 6px; }
      .card-actions .btn { flex: 1; text-align: center; min-width: 80px; }
      .info-table th { width: 100px; font-size: 0.75em; }
      .info-table td { font-size: 0.82em; word-break: break-word; }
      .booking-card { padding: 14px; }
      main { padding: 0 10px 40px; }
      .page-title { font-size: 1em; }
      .card-footer .btn { flex: 1; text-align: center; }
    }
  </style>
</head>
<body>
  <header>
    <h1>🚗 Waliko Car Hire</h1>
    <nav>
      <a href="car-available.html">Home</a>
      <a href="car-available.html">Cars</a>
      <a href="bookings.html" class="active">My Bookings</a>
      <a href="payments.html">Payments</a>
      <a href="help.html">Help</a>
      <a href="account.html">Settings</a>
      <a href="feedback.html">Feedback</a>
      <a href="index.html" class="logout" id="logoutBtn">Logout</a>
    </nav>
  </header>

  <main>
    <div class="page-title">My Bookings</div>
    <div id="bookingsList"></div>
  </main>

  <script>
    let displayCount = 3;

    function renderBookings() {
      const list = document.getElementById('bookingsList');
      list.innerHTML = '';
      const bookings = JSON.parse(localStorage.getItem('bookings')) || [];

      if (bookings.length === 0) {
        list.innerHTML = `<div class="empty-msg">
          <p>You haven't made any bookings yet.</p>
          <p>Go to <a href="car-available.html">Cars</a> to browse and book a vehicle.</p>
        </div>`;
        return;
      }

      bookings.slice(0, displayCount).forEach((b, idx) => {
        const days    = Math.max(1, Math.ceil((new Date(b.endDate) - new Date(b.pickup)) / 86400000));
        const total   = b.price * days;
        const deposit = Math.floor(total / 2);
        const isPaid  = b.paymentStatus === 'paid';

        // Build status box
        const statusHTML = isPaid
          ? `<div class="status-box status-success">
              ✅ <strong>Deposit Paid!</strong> Receipt: <strong>${b.mpesaReceipt || ''}</strong> — Your booking is confirmed. Balance of <strong>Ksh ${(total - deposit).toLocaleString()}</strong> is due at pickup. 🚗
             </div>`
          : `<div class="status-box status-pending">
              ⏳ <strong>Pending Payment:</strong> Pay a deposit of <strong>Ksh ${deposit.toLocaleString()}</strong> to confirm your booking.
              The remaining <strong>Ksh ${(total - deposit).toLocaleString()}</strong> is paid when picking up the car.
             </div>`;

        const card = document.createElement('div');
        card.className = 'booking-card';
        card.innerHTML = `
          <div class="card-header">
            <div>
              <h3>${b.carName}</h3>
              <div class="booking-id">ID: ${b.bookingId} &nbsp;·&nbsp; ${b.timestamp}</div>
            </div>
            <div class="card-actions">
              ${!isPaid ? `<button class="btn btn-pay" data-amount="${deposit}" data-id="${b.bookingId}">Pay Deposit</button>` : ''}
              <button class="btn btn-delete" data-idx="${idx}">Delete</button>
            </div>
          </div>

          <table class="info-table">
            <tr><th>Full Name</th><td>${b.fullName}</td></tr>
            <tr><th>Phone No.</th><td>${b.phone}</td></tr>
            <tr><th>National ID</th><td>${b.nationalId}</td></tr>
            <tr><th>Licence No.</th><td>${b.license}</td></tr>
            <tr><th>Start Date</th><td>${b.pickup}</td></tr>
            <tr><th>End Date</th><td>${b.endDate}</td></tr>
            <tr><th>Days Booked</th><td>${days} day${days !== 1 ? 's' : ''}</td></tr>
            <tr><th>Price/Day</th><td>Ksh ${b.price.toLocaleString()}</td></tr>
            <tr><th>Total Fee</th><td>Ksh ${total.toLocaleString()}</td></tr>
          </table>

          ${statusHTML}

          <div class="card-footer">
            <button class="btn btn-pdf" data-id="${b.bookingId}">⬇ Download PDF</button>
          </div>
        `;
        list.appendChild(card);
      });

      if (bookings.length > displayCount) {
        const btn = document.createElement('button');
        btn.className = 'show-more-btn';
        btn.textContent = `Show More (${bookings.length - displayCount} remaining)`;
        btn.addEventListener('click', () => { displayCount += 5; renderBookings(); });
        list.appendChild(btn);
      }

      // Pay buttons
      list.querySelectorAll('.btn-pay').forEach(btn => {
        btn.addEventListener('click', () => {
          localStorage.setItem('paymentAmount', btn.dataset.amount);
          localStorage.setItem('paymentBookingId', btn.dataset.id);
          window.location.href = 'payment-gateway.html';
        });
      });

      // Delete buttons
      list.querySelectorAll('.btn-delete').forEach(btn => {
        btn.addEventListener('click', () => {
          if (confirm('Delete this booking?')) {
            const bookings = JSON.parse(localStorage.getItem('bookings')) || [];
            bookings.splice(btn.dataset.idx, 1);
            localStorage.setItem('bookings', JSON.stringify(bookings));
            renderBookings();
          }
        });
      });

      // PDF buttons
      list.querySelectorAll('.btn-pdf').forEach(btn => {
        btn.addEventListener('click', () => downloadPDF(btn.dataset.id));
      });
    }

    function downloadPDF(bookingId) {
      const bookings = JSON.parse(localStorage.getItem('bookings')) || [];
      const b = bookings.find(x => x.bookingId === bookingId);
      if (!b) { alert('Booking not found.'); return; }

      const days    = Math.max(1, Math.ceil((new Date(b.endDate) - new Date(b.pickup)) / 86400000));
      const total   = b.price * days;
      const deposit = Math.floor(total / 2);
      const balance = total - deposit;
      const isPaid  = b.paymentStatus === 'paid';
      const receipt = b.mpesaReceipt || '';
      const paidAt  = b.paidAt || '';

      const { jsPDF } = window.jspdf;
      const pdf = new jsPDF({ unit: 'mm', format: 'a4' });
      const W = 210, H = 297, L = 14, R = 196, CW = 182;

      // HEADER
      pdf.setFillColor(20,100,221); pdf.rect(0,0,W,38,'F');
      pdf.setFillColor(13,71,161); pdf.triangle(0,38,70,0,0,0,'F');
      pdf.setTextColor(255,255,255);
      pdf.setFontSize(22); pdf.setFont('helvetica','bold');
      pdf.text('WALIKO', L, 17);
      pdf.setFontSize(9); pdf.setFont('helvetica','normal');
      pdf.text('CAR HIRE', L, 25);
      pdf.setFontSize(6.5); pdf.setTextColor(180,210,255);
      pdf.text('235 Fashion Street, Nairobi  |  0790 337 687  |  walik@gmail.com', L, 32);

      if (isPaid) {
        pdf.setFillColor(39,174,96); pdf.roundedRect(145,8,51,14,3,3,'F');
        pdf.setTextColor(255,255,255); pdf.setFontSize(8.5); pdf.setFont('helvetica','bold');
        pdf.text('DEPOSIT PAID', 170, 16, { align:'center' });
        pdf.setFontSize(6.5); pdf.setFont('helvetica','normal');
        pdf.text('Booking Confirmed', 170, 20.5, { align:'center' });
      } else {
        pdf.setFillColor(255,193,7); pdf.roundedRect(145,8,51,14,3,3,'F');
        pdf.setTextColor(60,30,0); pdf.setFontSize(8.5); pdf.setFont('helvetica','bold');
        pdf.text('PENDING PAYMENT', 170, 16, { align:'center' });
        pdf.setFontSize(6.5); pdf.setFont('helvetica','normal');
        pdf.text('Action Required', 170, 20.5, { align:'center' });
      }

      let y = 46;

      // BOOKING ID BAND
      pdf.setFillColor(235,242,255); pdf.roundedRect(L,y,CW,20,3,3,'F');
      pdf.setDrawColor(20,100,221); pdf.setLineWidth(0.4); pdf.roundedRect(L,y,CW,20,3,3,'S');
      pdf.setFillColor(20,100,221); pdf.roundedRect(L,y,5,20,2,2,'F');
      pdf.setTextColor(100,120,180); pdf.setFontSize(6); pdf.setFont('helvetica','bold');
      pdf.text('BOOKING REFERENCE', L+9, y+7);
      pdf.setFontSize(14); pdf.setTextColor(10,30,100); pdf.setFont('helvetica','bold');
      pdf.text(b.bookingId, L+9, y+16);
      pdf.setTextColor(150,150,160); pdf.setFontSize(6.5); pdf.setFont('helvetica','normal');
      pdf.text('Issued: ' + b.timestamp, R-2, y+16, { align:'right' });
      y += 26;

      // RECEIPT BOX (only if paid)
      if (isPaid && receipt) {
        pdf.setFillColor(240,255,248); pdf.roundedRect(L,y,CW,20,3,3,'F');
        pdf.setDrawColor(39,174,96); pdf.setLineWidth(0.5); pdf.roundedRect(L,y,CW,20,3,3,'S');
        pdf.setFillColor(39,174,96); pdf.roundedRect(L,y,5,20,2,2,'F');
        pdf.setTextColor(15,100,50); pdf.setFontSize(8); pdf.setFont('helvetica','bold');
        pdf.text('M-PESA RECEIPT NO: ' + receipt, L+9, y+8);
        pdf.setFontSize(7); pdf.setFont('helvetica','normal');
        pdf.text('Deposit of Ksh ' + deposit.toLocaleString() + ' successfully received' + (paidAt ? ' on ' + paidAt : ''), L+9, y+14);
        pdf.setTextColor(100,140,110);
        pdf.text('Remaining balance: Ksh ' + balance.toLocaleString() + ' — payable at vehicle pickup', L+9, y+19);
        y += 26;
      }

      // CUSTOMER DETAILS HEADER
      pdf.setFillColor(20,100,221); pdf.roundedRect(L,y,CW,9,2,2,'F');
      pdf.setTextColor(255,255,255); pdf.setFontSize(7.5); pdf.setFont('helvetica','bold');
      pdf.text('CUSTOMER & VEHICLE DETAILS', L+5, y+6);
      y += 9;

      const details = [
        ['Full Name', b.fullName],
        ['Phone', b.phone],
        ['National ID', b.nationalId],
        ['Licence No.', b.license],
        ['Vehicle', b.carName],
        ['Pickup Date', b.pickup],
        ['Return Date', b.endDate],
        ['Duration', days + ' day' + (days!==1?'s':'')],
      ];
      details.forEach((row,i) => {
        const ry = y+i*8.5;
        pdf.setFillColor(i%2===0?248:255, i%2===0?250:255, i%2===0?255:255);
        pdf.rect(L,ry,CW,8.5,'F');
        pdf.setFillColor(20,100,221); pdf.rect(L,ry,3,8.5,'F');
        pdf.setTextColor(130,130,150); pdf.setFontSize(7.5); pdf.setFont('helvetica','bold');
        pdf.text(row[0], L+6, ry+5.8);
        pdf.setTextColor(20,20,40); pdf.setFont('helvetica','normal');
        pdf.text(String(row[1]), L+72, ry+5.8);
      });
      y += details.length*8.5+6;

      // PAYMENT SUMMARY HEADER
      pdf.setFillColor(20,100,221); pdf.roundedRect(L,y,CW,9,2,2,'F');
      pdf.setTextColor(255,255,255); pdf.setFontSize(7.5); pdf.setFont('helvetica','bold');
      pdf.text('PAYMENT SUMMARY', L+5, y+6);
      y += 9;

      const payRows = [
        { label:'Daily Rate',        val:'Ksh ' + b.price.toLocaleString(),   bold:false, hi:false, green:false },
        { label:'Number of Days',    val:days + ' days',                       bold:false, hi:false, green:false },
        { label:'Total Rental Cost', val:'Ksh ' + total.toLocaleString(),      bold:true,  hi:true,  green:false },
        { label:'Deposit (50%)',     val:'Ksh ' + deposit.toLocaleString(),    bold:true,  hi:false, green:isPaid },
        { label:'Balance on Pickup', val:'Ksh ' + balance.toLocaleString(),    bold:false, hi:false, green:false },
      ];
      payRows.forEach((row,i) => {
        const ry = y+i*9;
        if(row.hi) pdf.setFillColor(228,240,255);
        else if(row.green) pdf.setFillColor(235,255,244);
        else pdf.setFillColor(i%2===0?248:255, i%2===0?250:255, i%2===0?255:255);
        pdf.rect(L,ry,CW,9,'F');
        const ac = row.hi?[20,100,221]:row.green?[39,174,96]:[20,100,221];
        pdf.setFillColor(...ac); pdf.rect(L,ry,3,9,'F');
        const lc = row.hi?[20,80,180]:row.green?[20,120,60]:[130,130,150];
        const vc = row.hi?[20,80,180]:row.green?[20,120,60]:[20,20,40];
        pdf.setTextColor(...lc); pdf.setFontSize(7.5); pdf.setFont('helvetica',row.bold?'bold':'normal');
        pdf.text(row.label, L+6, ry+6);
        pdf.setTextColor(...vc); pdf.setFont('helvetica',row.bold?'bold':'normal');
        pdf.text(row.val, R-2, ry+6, { align:'right' });
      });
      y += payRows.length*9+8;

      // NOTE BOX
      const noteH = isPaid ? 14 : 20;
      pdf.setFillColor(255,252,235); pdf.setDrawColor(255,193,7); pdf.setLineWidth(0.4);
      pdf.roundedRect(L,y,CW,noteH,3,3,'FD');
      pdf.setFillColor(255,193,7); pdf.roundedRect(L,y,5,noteH,2,2,'F');
      pdf.setTextColor(100,70,0); pdf.setFontSize(7.5); pdf.setFont('helvetica','bold');
      if (isPaid) {
        pdf.text('Your booking is confirmed! Present this document when collecting your vehicle.', L+9, y+9);
      } else {
        pdf.text('ACTION REQUIRED:', L+9, y+7);
        pdf.setFont('helvetica','normal'); pdf.setFontSize(7);
        pdf.text('Pay deposit of Ksh ' + deposit.toLocaleString() + ' to confirm your booking.', L+9, y+13);
        pdf.text('Balance of Ksh ' + balance.toLocaleString() + ' is payable at vehicle pickup.', L+9, y+19);
      }
      y += noteH + 10;

      // SIGNATURES
      pdf.setDrawColor(200,200,215); pdf.setLineWidth(0.3);
      pdf.line(L,y+12,L+78,y+12); pdf.line(L+104,y+12,R,y+12);
      pdf.setTextColor(170,170,180); pdf.setFontSize(6.5); pdf.setFont('helvetica','normal');
      pdf.text('Customer Signature', L, y+16);
      pdf.text('Authorized by Waliko Car Hire', L+104, y+16);

      // FOOTER
      pdf.setFillColor(13,71,161); pdf.rect(0,H-20,W,3,'F');
      pdf.setFillColor(20,100,221); pdf.rect(0,H-17,W,17,'F');
      pdf.setTextColor(255,255,255); pdf.setFontSize(10); pdf.setFont('helvetica','bold');
      pdf.text('Thank you for choosing Waliko Car Hire!', W/2, H-9, { align:'center' });
      pdf.setFontSize(6.5); pdf.setFont('helvetica','normal'); pdf.setTextColor(180,210,255);
      pdf.text('walik@gmail.com  •  0790 337 687  •  235 Fashion Street, Nairobi, Kenya', W/2, H-3.5, { align:'center' });

      pdf.save('Waliko_Booking_' + bookingId + '.pdf');
    }

    document.getElementById('logoutBtn').addEventListener('click', e => {
      e.preventDefault();
      localStorage.removeItem('isLoggedIn');
      localStorage.removeItem('currentUser');
      window.location.href = 'index.html';
    });

    renderBookings();
  </script>
</body>
</html>

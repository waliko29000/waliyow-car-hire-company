<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cars – Waliko Car Hire</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Poppins', sans-serif;
      background: #f0f4ff;
      color: #333;
    }

    /* ── HEADER ── */
    header {
      background: linear-gradient(135deg, #1464dd, #0d47a1);
      color: #fff;
      padding: 10px 20px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 3px 15px rgba(20,100,221,0.35);
    }

    header h1 { font-size: 1.2em; font-weight: 700; }

    nav { display: flex; flex-wrap: wrap; gap: 6px; }

    nav a {
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.25);
      color: #fff;
      padding: 7px 13px;
      border-radius: 25px;
      font-size: 0.78em;
      font-weight: 500;
      text-decoration: none;
      transition: all 0.2s;
    }

    nav a:hover, nav a.active {
      background: rgba(255,255,255,0.3);
      border-color: rgba(255,255,255,0.6);
    }

    nav a.logout {
      border-color: rgba(255,100,100,0.4);
      color: #ffaaaa;
    }

    nav a.logout:hover { background: rgba(255,80,80,0.2); }

    /* ── MAIN ── */
    main {
      max-width: 1100px;
      margin: 24px auto;
      padding: 0 16px;
    }

    .notice-box { background: #fff; border-radius: 14px; padding: 24px 26px; box-shadow: 0 3px 16px rgba(20,100,221,0.09); border: 1px solid rgba(20,100,221,0.07); }
    .notice-box h2 { margin-bottom: 16px; color: #1464dd; font-size: 1.1em; font-weight: 700; padding-bottom: 12px; border-bottom: 2px solid #f0f4ff; }
    .notice-box p { margin-bottom: 10px; font-size: 0.9em; line-height: 1.8; color: #555; }
    .notice-box p strong { color: #1464dd; font-weight: 600; }
    .notice-box .notice-item { display: flex; gap: 10px; align-items: flex-start; padding: 10px 12px; border-radius: 8px; background: #f0f4ff; margin-bottom: 8px; font-size: 0.88em; color: #444; line-height: 1.6; }
    .notice-box .notice-item .icon { font-size: 1.1em; flex-shrink: 0; margin-top: 1px; }

    .page-title {
      font-size: 1.2em;
      font-weight: 700;
      color: #1464dd;
      margin-bottom: 16px;
    }

    /* ── CAR GRID ── */
    .car-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }

    .car-card {
      background: #fff;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 3px 16px rgba(20,100,221,0.09);
      border: 1px solid rgba(20,100,221,0.07);
      display: flex;
      flex-direction: column;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .car-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(20,100,221,0.15);
    }

    .car-card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      background: #e8eef8;
    }

    .car-card img[src=""],
    .car-card img:not([src]) {
      height: 180px;
      background: linear-gradient(135deg, #e8eef8, #d0dcf5);
    }

    .car-info {
      padding: 14px 16px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .car-info h3 { font-size: 1em; font-weight: 700; color: #1a1a2e; }

    .car-info .price {
      font-size: 1em;
      font-weight: 700;
      color: #1464dd;
      margin: 4px 0;
    }

    .car-info p { font-size: 0.8em; color: #666; line-height: 1.5; }

    .car-info .badge {
      display: inline-block;
      background: #e6f0ff;
      color: #1464dd;
      font-size: 0.72em;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 20px;
      margin-top: 6px;
      width: fit-content;
    }

    .book-btn {
      margin: 0 16px 16px;
      padding: 9px;
      background: linear-gradient(135deg, #1464dd, #0d47a1);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: 'Poppins', sans-serif;
      font-size: 0.85em;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .book-btn:hover {
      background: linear-gradient(135deg, #0d47a1, #083080);
      transform: translateY(-1px);
    }

    /* ── BOOKING MODAL ── */
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(4px);
      z-index: 1000;
      justify-content: center;
      align-items: center;
      padding: 16px;
    }

    .modal.open { display: flex; }

    .modal-box {
      background: #fff;
      border-radius: 16px;
      padding: 28px 24px;
      width: 100%;
      max-width: 420px;
      position: relative;
      box-shadow: 0 20px 50px rgba(0,0,0,0.25);
      animation: slideUp 0.25s ease;
      max-height: 90vh;
      overflow-y: auto;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .modal-box h2 {
      font-size: 1.2em;
      font-weight: 700;
      color: #1464dd;
      margin-bottom: 4px;
    }

    .modal-box .car-tag {
      font-size: 0.8em;
      color: #888;
      margin-bottom: 16px;
    }

    .modal-close {
      position: absolute;
      top: 14px; right: 16px;
      background: #f0f4ff;
      border: none;
      width: 28px; height: 28px;
      border-radius: 50%;
      font-size: 1em;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: #555;
      transition: background 0.2s;
    }

    .modal-close:hover { background: #dde3f0; color: #1464dd; }

    .form-group { margin-bottom: 12px; }

    .form-group label {
      display: block;
      font-size: 0.8em;
      font-weight: 600;
      color: #444;
      margin-bottom: 4px;
    }

    .form-group input {
      width: 100%;
      padding: 9px 12px;
      border: 1.5px solid #dde3f0;
      border-radius: 8px;
      font-family: 'Poppins', sans-serif;
      font-size: 0.88em;
      outline: none;
      transition: border-color 0.2s;
    }

    .form-group input:focus {
      border-color: #1464dd;
      box-shadow: 0 0 0 3px rgba(20,100,221,0.1);
    }

    .submit-btn {
      width: 100%;
      padding: 11px;
      background: linear-gradient(135deg, #1464dd, #0d47a1);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: 'Poppins', sans-serif;
      font-size: 0.92em;
      font-weight: 600;
      cursor: pointer;
      margin-top: 4px;
      transition: all 0.2s;
    }

    .submit-btn:hover {
      background: linear-gradient(135deg, #0d47a1, #083080);
      transform: translateY(-1px);
    }



    @media (max-width: 700px) {
      header { flex-direction: column; align-items: flex-start; gap: 8px; }
      nav { margin-top: 4px; width: 100%; }
      header h1 { font-size: 1em; }
      nav a { font-size: 0.7em; padding: 6px 10px; }
      main { margin: 12px auto; }

      /* Fix car grid — 1 column on mobile */
      .car-grid { grid-template-columns: 1fr; gap: 12px; }

      /* Fix card content overflow */
      .car-card { width: 100%; min-width: 0; }
      .car-info { padding: 12px; }
      .car-info h3 { font-size: 0.95em; }
      .car-info p { font-size: 0.78em; }
      .car-info .price { font-size: 0.95em; }
      .book-btn { margin: 0 12px 12px; font-size: 0.82em; padding: 8px; }
      .car-card img { height: 160px; }

      /* Modal full screen on mobile */
      .modal { padding: 8px; align-items: flex-end; }
      .modal-box { border-radius: 16px 16px 0 0; max-height: 92vh; }
    }
  </style>
</head>
<body>



  <header>
    <h1>Waliko Car Hire(Dashboard)</h1>
    <nav>
      
      <a href="#" id="homeLink">Home</a>
      <a href="#" id="carsLink" class="active">Cars</a>
      <a href="bookings.html">My Bookings</a>
      <a href="payments.html">Payments</a>
      <a href="help.html">Help</a>
      <a href="account.html">Settings</a>
      <a href="feedback.html">Feedback</a>
      <a href="index.html" class="logout" id="logoutBtn">Logout</a>
    </nav>
  </header>


  <main>
    <div class="page-title">Available Cars</div>
    <div class="car-grid" id="carGrid"></div>
  </main>

  <!-- Booking Modal -->
  <div class="modal" id="bookingModal">
    <div class="modal-box">
      <button class="modal-close" id="closeModal">✕</button>
      <h2>Book Car</h2>
      <div class="car-tag" id="modalCarName"></div>
      <form id="bookingForm">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="fullName" placeholder="Enter full name" required />
        </div>
        <div class="form-group">
          <label>National ID</label>
          <input type="text" id="nationalId" placeholder="Enter national ID" required />
        </div>
        <div class="form-group">
          <label>Phone Number</label>
          <input type="text" id="phone" placeholder="07XXXXXXXX" required />
        </div>
        <div class="form-group">
          <label>Driver Licence No.</label>
          <input type="text" id="license" placeholder="Enter licence number" required />
        </div>
        <div class="form-group">
          <label>Renting Start Date</label>
          <input type="date" id="pickup" required />
        </div>
        <div class="form-group">
          <label>Renting End Date</label>
          <input type="date" id="endDate" required />
        </div>
        <button type="submit" class="submit-btn">Submit Booking</button>
      </form>
    </div>
  </div>

  <script>
    const cars = [
      { name: "Toyota Prado TX",     price: 10000, description: "Luxury SUV with 4WD.",                                         image: "car1.jpg" },
      { name: "Subaru Forester",      price: 5000,  description: "Reliable and fuel-efficient.",                                 image: "car2.jpg" },
      { name: "Toyota Harrier",       price: 6500,  description: "Comfortable sedan.",                                           image: "car3.jpg" },
      { name: "Suzuki Alto",          price: 2000,  description: "Compact and fuel-efficient.",                                  image: "alto.jpg" },
      { name: "Toyota Premio",        price: 3000,  description: "Spacious sedan with a smooth ride.",                          image: "premio.jpg" },
      { name: "Toyota Sienta",        price: 3500,  description: "Versatile family minivan.",                                   image: "sienta.jpg" },
      { name: "Toyota Succeed",       price: 3500,  description: "Compact and fuel efficient.",                                 image: "" },
      { name: "Mercedes Benz C200",   price: 10000, description: "Luxury executive car.",                                       image: "car5.jpg" },
      { name: "Range Rover Sport",    price: 25000, description: "Premium off-road vehicle.",                                   image: "car6.jpg" },
      { name: "Mazda CX-5",           price: 4000,  description: "Stylish and fuel-efficient.",                                 image: "car7.jpg" },
      { name: "Honda CR-V",           price: 4500,  description: "Compact SUV with great mileage.",                             image: "car8.jpg" },
      { name: "Hyundai Tucson",       price: 8000,  description: "Comfortable crossover with modern features.",                 image: "car9.jpg" },
      { name: "Subaru Impreza",       price: 4500,  description: "Sporty and efficient AWD sedan.",                             image: "car10.jpg" },
      { name: "Toyota Vitz",          price: 3000,  description: "Compact and fuel-efficient city car.",                        image: "car11.jpg" },
      { name: "Toyota Wish",          price: 3500,  description: "Spacious MPV with great reliability.",                       image: "car12.jpg" },
      { name: "Toyota Prado TXL",     price: 11000, description: "Advanced SUV with a powerful engine.",                       image: "car13.jpg" },
      { name: "Toyota Axio",          price: 4000,  description: "Reliable compact sedan ideal for city and highway driving.", image: "car17.jpg" },
      { name: "Toyota Fielder",       price: 3500,  description: "Spacious station wagon perfect for families and cargo.",     image: "car18.jpg" },
      { name: "Toyota Prado TXG",     price: 11500, description: "High-performance version of the TXL with luxury features.", image: "car14.jpg" },
    ];

    let currentCar = null;

    function setActive(id) {
      document.querySelectorAll('nav a').forEach(a => a.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }

    // ── Show Home instructions ──
    function renderHome() {
      setActive('homeLink');
      document.querySelector('.page-title').style.display = 'none';
      document.getElementById('carGrid').innerHTML = `
        <div style="grid-column:1/-1">
          <div class="notice-box">
            <p>• This system allows you to view and book available cars.</p>
            <p>• Click <strong>"Cars"</strong> to explore our fleet and press <strong>"Book Now"</strong> on any available vehicle.</p>
            <p>• After booking, open <strong>"My Bookings"</strong> to see your pending reservations. You can delete a booking or proceed to make payment.</p>
            <p>• Once payment is made, your status will be updated in the <strong>Payments</strong> section.</p>
            <p>• To get a receipt, click the <strong>"Get Receipt"</strong> button inside the Payments section.</p>
            <p>• If you experience a problem, press the <strong>"Help"</strong> button.</p>
            <p>• By clicking <strong>"Settings"</strong>, you can update your personal information, change your password, access Emergency Services, or manage account deletion/deactivation.</p>
            <p><strong>✨ Thank you for choosing Waliko Car Hire!</strong></p>
          </div>
        </div>
      `;
    }

    // ── Show Cars grid ──
    function renderCars() {
      setActive('carsLink');
      document.querySelector('.page-title').style.display = 'block';
      document.querySelector('.page-title').textContent = 'Available Cars';
      const grid = document.getElementById('carGrid');
      grid.innerHTML = '';
      cars.forEach((car, i) => {
        const card = document.createElement('div');
        card.className = 'car-card';
        card.innerHTML = `
          <img src="${car.image}" alt="${car.name}" onerror="this.style.background='linear-gradient(135deg,#e8eef8,#d0dcf5)';this.removeAttribute('src')">
          <div class="car-info">
            <h3>${car.name}</h3>
            <div class="price">Ksh ${car.price.toLocaleString()} <span style="font-size:0.75em;font-weight:400;color:#888">/ day</span></div>
            <p>${car.description}</p>
            <span class="badge">✅ Available</span>
          </div>
          <button class="book-btn" data-index="${i}">Book Now</button>
        `;
        grid.appendChild(card);
      });
    }

    // ── Load: show Home instructions by default ──
    renderHome();

    // ── Nav clicks ──
    document.getElementById('homeLink').addEventListener('click', e => {
      e.preventDefault();
      renderHome();
    });

    document.getElementById('carsLink').addEventListener('click', e => {
      e.preventDefault();
      renderCars();
    });

    // ── Book button click ──
    document.getElementById('carGrid').addEventListener('click', e => {
      if (e.target.classList.contains('book-btn')) {
        currentCar = cars[e.target.dataset.index];
        document.getElementById('modalCarName').textContent = `Booking: ${currentCar.name} — Ksh ${currentCar.price.toLocaleString()}/day`;
        document.getElementById('bookingForm').reset();
        document.getElementById('bookingModal').classList.add('open');
      }
    });

    // ── Close modal ──
    document.getElementById('closeModal').addEventListener('click', () => {
      document.getElementById('bookingModal').classList.remove('open');
    });
    document.getElementById('bookingModal').addEventListener('click', e => {
      if (e.target === document.getElementById('bookingModal'))
        document.getElementById('bookingModal').classList.remove('open');
    });

    // ── Submit booking ──
    document.getElementById('bookingForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const fullName   = document.getElementById('fullName').value.trim();
      const nationalId = document.getElementById('nationalId').value.trim();
      const phone      = document.getElementById('phone').value.trim();
      const license    = document.getElementById('license').value.trim();
      const pickup     = document.getElementById('pickup').value;
      const endDate    = document.getElementById('endDate').value;

      if (phone.length !== 10 || !phone.startsWith('07')) {
        alert("Phone number must be exactly 10 digits and start with '07'."); return;
      }
      if (!/^\d{7,}$/.test(nationalId)) {
        alert("National ID must be at least 7 digits."); return;
      }
      if (!/^[a-zA-Z0-9]{7,}$/.test(license)) {
        alert("Licence No. must be at least 7 characters (letters and digits only)."); return;
      }
      if (new Date(endDate) <= new Date(pickup)) {
        alert("End date must be later than start date."); return;
      }

      const bookingId = '#' + String(Math.floor(Math.random() * 1_000_000_000)).padStart(9, '0');
      const booking = {
        bookingId, fullName, nationalId, phone, license,
        pickup, endDate, carName: currentCar.name,
        price: currentCar.price,
        timestamp: new Date().toLocaleString()
      };

      const bookings = JSON.parse(localStorage.getItem('bookings')) || [];
      bookings.unshift(booking);
      localStorage.setItem('bookings', JSON.stringify(bookings));

      alert(`✅ Booking created!\n\nBooking ID: ${bookingId}\nGo to "My Bookings" to pay and confirm.`);
      document.getElementById('bookingModal').classList.remove('open');
    });

    // ── Logout ──
    document.getElementById('logoutBtn').addEventListener('click', e => {
      e.preventDefault();
      localStorage.removeItem('isLoggedIn');
      localStorage.removeItem('currentUser');
      localStorage.removeItem('userEmail');
      localStorage.removeItem('userPassword');
      window.location.href = 'index.html';
    });
  </script>
</body>
</html>

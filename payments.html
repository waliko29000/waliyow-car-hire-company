<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Payments – Waliko Car Hire</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Poppins',sans-serif;background:#f0f4ff;color:#333;}
    header{background:linear-gradient(135deg,#1464dd,#0d47a1);color:#fff;padding:10px 20px;display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 3px 15px rgba(20,100,221,0.35);}
    header h1{font-size:1.2em;font-weight:700;}
    nav{display:flex;flex-wrap:wrap;gap:6px;}
    nav a{background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.25);color:#fff;padding:7px 13px;border-radius:25px;font-size:0.78em;font-weight:500;text-decoration:none;transition:all 0.2s;}
    nav a:hover,nav a.active{background:rgba(255,255,255,0.3);border-color:rgba(255,255,255,0.6);}
    nav a.logout{border-color:rgba(255,100,100,0.4);color:#ffaaaa;}
    nav a.logout:hover{background:rgba(255,80,80,0.2);}
    main{max-width:900px;margin:24px auto;padding:0 16px 40px;}
    .page-title{font-size:1.2em;font-weight:700;color:#1464dd;margin-bottom:16px;}
    .empty-card{background:#fff;border-radius:14px;padding:28px 24px;box-shadow:0 3px 16px rgba(20,100,221,0.09);border:1px solid rgba(20,100,221,0.07);margin-bottom:16px;}
    .alert-box{background:#fff5e6;border:1px solid #ffc87a;border-radius:10px;padding:14px 16px;font-size:0.88em;color:#b35c00;line-height:1.7;margin-bottom:16px;}
    .pending-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #f0f4ff;flex-wrap:wrap;gap:8px;}
    .pending-row:last-child{border-bottom:none;}
    .payment-card{background:#fff;border-radius:14px;padding:20px;margin-bottom:16px;box-shadow:0 3px 16px rgba(20,100,221,0.09);border:1px solid rgba(20,100,221,0.07);animation:fadeIn 0.3s ease;}
    @keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
    .p-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px;}
    .p-header h3{font-size:1em;font-weight:700;color:#1a1a2e;}
    .p-id{font-size:0.75em;color:#888;margin-top:2px;}
    .status-badge{padding:5px 14px;border-radius:20px;font-size:0.75em;font-weight:700;}
    .status-paid{background:#e6f9ee;color:#1e8449;border:1px solid #a8ddb9;}
    .info-table{width:100%;border-collapse:collapse;margin-bottom:14px;}
    .info-table tr{border-bottom:1px solid #f0f4ff;}
    .info-table tr:last-child{border-bottom:none;}
    .info-table th{text-align:left;font-size:0.78em;font-weight:600;color:#888;padding:6px 8px 6px 0;width:150px;}
    .info-table td{font-size:0.85em;color:#333;padding:6px 8px 6px 0;}
    .card-footer{display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap;}
    .btn{padding:8px 16px;border:none;border-radius:8px;font-family:'Poppins',sans-serif;font-size:0.8em;font-weight:600;cursor:pointer;transition:all 0.2s;position:relative;z-index:10;}
    .btn-blue{background:#1464dd;color:#fff;}
    .btn-blue:hover{background:#0d47a1;}
    .btn-green{background:#1a7040;color:#fff;}
    .btn-green:hover{background:#145530;}
    .btn-light{background:#f0f4ff;color:#1464dd;border:1px solid #c5d5f5;}
    .btn-light:hover{background:#e0eaff;}
    /* MODAL */
    .modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);backdrop-filter:blur(4px);z-index:500;justify-content:center;align-items:center;padding:16px;}
    .modal.open{display:flex;}
    .modal-box{background:#fff;border-radius:16px;padding:28px 24px;width:100%;max-width:430px;position:relative;z-index:600;box-shadow:0 20px 50px rgba(0,0,0,0.25);animation:slideUp 0.25s ease;}
    @keyframes slideUp{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);}}
    .modal-box h2{font-size:1.1em;font-weight:700;color:#0d3b8c;margin-bottom:16px;}
    .modal-close{position:absolute;top:14px;right:16px;background:#f0f4ff;border:none;width:28px;height:28px;border-radius:50%;font-size:1em;cursor:pointer;color:#555;display:flex;align-items:center;justify-content:center;z-index:10;}
    .modal-close:hover{background:#dde3f0;}
    .receipt-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #f0f4ff;font-size:0.85em;}
    .receipt-row:last-child{border-bottom:none;}
    .receipt-row .label{color:#888;}
    .receipt-row .value{font-weight:600;color:#1a1a2e;}
    .modal-actions{display:flex;gap:8px;margin-top:18px;justify-content:flex-end;position:relative;z-index:10;}
    @media(max-width:600px){header{flex-direction:column;align-items:flex-start;gap:8px;}nav a{font-size:0.72em;padding:6px 10px;}.info-table th{width:110px;font-size:0.73em;}}
  </style>
</head>
<body>
  <header>
    <h1>Waliko Car Hire</h1>
    <nav>
      <a href="dashboard.html">Home</a>
      <a href="car-available.html">Cars</a>
      <a href="bookings.html">My Bookings</a>
      <a href="payments.html" class="active">Payments</a>
      <a href="help.html">Help</a>
      <a href="account.html">Settings</a>
      <a href="feedback.html">Feedback</a>
      <a href="index.html" class="logout" id="logoutBtn">Logout</a>
    </nav>
  </header>

  <main>
    <div class="page-title">Payment History</div>
    <div id="paymentsList"></div>
  </main>

  <div class="modal" id="receiptModal">
    <div class="modal-box">
      <button class="modal-close" id="closeReceipt">&#10005;</button>
      <h2>&#x1F9FE; Payment Receipt</h2>
      <div id="receiptContent"></div>
      <div class="modal-actions">
        <button class="btn btn-light" id="printBtn">&#x1F5A8; Print</button>
        <button class="btn btn-green" id="downloadBtn">&#x2B07; Download PDF</button>
      </div>
    </div>
  </div>

  <!-- Load jsPDF FIRST before any script runs -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <script>
  (function(){
    var currentBooking = null;

    function isPaid(b){
      return b.paymentStatus==='paid'||(b.mpesaReceipt&&b.mpesaReceipt!=='N/A');
    }

    function calcAmounts(b){
      var days=Math.max(1,Math.ceil((new Date(b.endDate)-new Date(b.pickup))/86400000));
      var total=b.price*days;
      var deposit=Math.floor(total/2);
      var balance=total-deposit;
      return {days:days,total:total,deposit:deposit,balance:balance};
    }

    /* ─── RENDER PAGE ─── */
    function renderPayments(){
      var list=document.getElementById('paymentsList');
      list.innerHTML='';
      var bookings=JSON.parse(localStorage.getItem('bookings')||'[]');
      bookings.forEach(function(b){
        if(b.mpesaReceipt&&b.mpesaReceipt!=='N/A') b.paymentStatus='paid';
      });
      var paid=bookings.filter(function(b){return isPaid(b);});
      var pending=bookings.filter(function(b){return !isPaid(b);});

      paid.forEach(function(b){
        var a=calcAmounts(b);
        var card=document.createElement('div');
        card.className='payment-card';
        card.innerHTML=
          '<div class="p-header">'+
            '<div><h3>'+b.carName+'</h3>'+
            '<div class="p-id">Booking: '+b.bookingId+' &nbsp;&middot;&nbsp; Paid: '+(b.paidAt||'N/A')+'</div></div>'+
            '<span class="status-badge status-paid">&#x2705; Paid</span>'+
          '</div>'+
          '<table class="info-table">'+
            '<tr><th>Full Name</th><td>'+b.fullName+'</td></tr>'+
            '<tr><th>M-Pesa Receipt</th><td style="font-weight:700;color:#27ae60">'+(b.mpesaReceipt||'N/A')+'</td></tr>'+
            '<tr><th>Deposit Paid</th><td style="font-weight:700;color:#1464dd">Ksh '+a.deposit.toLocaleString()+'</td></tr>'+
            '<tr><th>Balance Due</th><td>Ksh '+a.balance.toLocaleString()+' (on pickup)</td></tr>'+
            '<tr><th>Start Date</th><td>'+b.pickup+'</td></tr>'+
            '<tr><th>End Date</th><td>'+b.endDate+'</td></tr>'+
          '</table>'+
          '<div class="card-footer">'+
            '<button class="btn btn-light" onclick="window.location.href=\'bookings.html\'">&#x1F4CB; View Booking</button>'+
            '<button class="btn btn-blue receipt-btn" data-id="'+b.bookingId+'">&#x1F9FE; Receipt</button>'+
          '</div>';
        list.appendChild(card);
      });

      if(pending.length>0){
        var wrap=document.createElement('div');
        wrap.className='empty-card';
        wrap.innerHTML='<div class="alert-box">&#x1F4B3; You have <strong>'+pending.length+'</strong> booking(s) awaiting deposit payment.</div>';
        pending.forEach(function(b){
          var a=calcAmounts(b);
          var row=document.createElement('div');
          row.className='pending-row';
          row.innerHTML=
            '<div>'+
              '<div style="font-size:0.88em;font-weight:600;color:#1a1a2e">'+b.carName+'</div>'+
              '<div style="font-size:0.75em;color:#888">'+b.bookingId+'</div>'+
            '</div>'+
            '<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">'+
              '<span style="font-size:0.82em;color:#b35c00;font-weight:600">Deposit: Ksh '+a.deposit.toLocaleString()+'</span>'+
              '<button class="btn btn-blue" style="font-size:0.75em;padding:6px 12px" '+
                'onclick="localStorage.setItem(\'paymentAmount\',\''+a.deposit+'\');'+
                'localStorage.setItem(\'paymentBookingId\',\''+b.bookingId+'\');'+
                'window.location.href=\'payment-gateway.html\'">Pay Now</button>'+
            '</div>';
          wrap.appendChild(row);
        });
        list.appendChild(wrap);
      }

      if(bookings.length===0){
        list.innerHTML = '<div class="empty-card"><div class="alert-box">&#x1F4B3; No payments made yet. <a href="car-available.html" style="color:#1464dd;font-weight:600">Browse cars</a> and pay to get started.</div></div>';
      }
      list.querySelectorAll('.receipt-btn').forEach(function(btn){
        btn.addEventListener('click',function(){openModal(btn.getAttribute('data-id'));});
      });
    }

    /* ─── OPEN MODAL ─── */
    function openModal(bookingId){
      var bookings=JSON.parse(localStorage.getItem('bookings')||'[]');
      var b=null;
      for(var i=0;i<bookings.length;i++){
        if(String(bookings[i].bookingId)===String(bookingId)){b=bookings[i];break;}
      }
      if(!b){alert('Receipt not found.');return;}
      currentBooking=b;
      var a=calcAmounts(b);
      document.getElementById('receiptContent').innerHTML=
        '<div class="receipt-row"><span class="label">Car</span><span class="value">'+b.carName+'</span></div>'+
        '<div class="receipt-row"><span class="label">Booking ID</span><span class="value">'+b.bookingId+'</span></div>'+
        '<div class="receipt-row"><span class="label">Full Name</span><span class="value">'+b.fullName+'</span></div>'+
        '<div class="receipt-row"><span class="label">M-Pesa Ref</span><span class="value" style="color:#1a7040">'+(b.mpesaReceipt||'N/A')+'</span></div>'+
        '<div class="receipt-row"><span class="label">Date Paid</span><span class="value">'+(b.paidAt||'N/A')+'</span></div>'+
        '<div class="receipt-row"><span class="label">Start Date</span><span class="value">'+b.pickup+'</span></div>'+
        '<div class="receipt-row"><span class="label">End Date</span><span class="value">'+b.endDate+'</span></div>'+
        '<div class="receipt-row"><span class="label">Deposit Paid</span><span class="value" style="color:#0d3b8c;font-size:1.05em">Ksh '+a.deposit.toLocaleString()+'</span></div>'+
        '<div class="receipt-row"><span class="label">Balance on Pickup</span><span class="value">Ksh '+a.balance.toLocaleString()+'</span></div>';
      document.getElementById('receiptModal').classList.add('open');
    }

    /* ─── BUILD PDF ─── */
    function buildPDF(b){
      var jsPDF=window.jspdf.jsPDF;
      var doc=new jsPDF({unit:'mm',format:'a4'});
      var PW=210,PH=297;
      var NR=13,NG=59,NB=140;
      var GR=244,GG=196,GB=48;
      var a=calcAmounts(b);
      var issued=new Date().toLocaleDateString('en-KE',{day:'2-digit',month:'long',year:'numeric'});

      function setNavy(){doc.setTextColor(NR,NG,NB);doc.setDrawColor(NR,NG,NB);}
      function setWhite(){doc.setTextColor(255,255,255);}

      /* HEADER */
      doc.setFillColor(NR,NG,NB);
      doc.rect(0,0,PW,46,'F');
      setWhite();
      doc.setFont('helvetica','bold');
      doc.setFontSize(22);
      doc.text('WALIKO CAR HIRE',14,20);
      doc.setFont('helvetica','normal');
      doc.setFontSize(9);
      doc.setTextColor(180,210,255);
      doc.text('Premium Vehicle Rentals  \u00B7  Nairobi, Kenya',14,29);
      doc.setTextColor(140,175,240);
      doc.setFontSize(8);
      doc.text('Receipt No: RCP-'+b.bookingId+'   \u00B7   Date: '+issued,14,39);
      doc.setFillColor(255,255,255);
      doc.roundedRect(PW-46,8,32,12,2,2,'F');
      setNavy();
      doc.setFont('helvetica','bold');
      doc.setFontSize(8.5);
      doc.text('RECEIPT',PW-30,15.5,{align:'center'});
      doc.setFillColor(GR,GG,GB);
      doc.rect(0,46,PW,4,'F');

      /* STATUS BAR */
      doc.setFillColor(240,245,255);
      doc.rect(0,50,PW,16,'F');
      doc.setTextColor(100,120,165);
      doc.setFont('helvetica','normal');
      doc.setFontSize(8);
      doc.text('Payment verified via M-Pesa  \u00B7  Deposit = 50% of total hire cost',14,60);
      doc.setFillColor(230,249,238);
      doc.roundedRect(PW-38,53,24,10,2,2,'F');
      doc.setTextColor(26,112,64);
      doc.setFont('helvetica','bold');
      doc.setFontSize(8);
      doc.text('\u2714  PAID',PW-26,59.5,{align:'center'});

      /* SECTION HEAD */
      function secHead(label,y){
        doc.setFillColor(NR,NG,NB);
        doc.rect(14,y,3,13,'F');
        setNavy();
        doc.setFont('helvetica','bold');
        doc.setFontSize(11);
        doc.text(label,21,y+9);
      }

      /* TABLE ROW */
      function tRow(label,value,y,shade,highlight,greenVal){
        if(highlight){
          doc.setFillColor(230,243,255);
          doc.rect(14,y-4,PW-28,11,'F');
          doc.setDrawColor(180,210,240);
          doc.setLineWidth(0.3);
          doc.rect(14,y-4,PW-28,11,'D');
        } else if(shade){
          doc.setFillColor(247,250,255);
          doc.rect(14,y-4,PW-28,11,'F');
        }
        doc.setTextColor(140,150,170);
        doc.setFont('helvetica','normal');
        doc.setFontSize(8.5);
        doc.text(label,18,y+3);
        if(greenVal) doc.setTextColor(26,112,64);
        else if(highlight) doc.setTextColor(NR,NG,NB);
        else doc.setTextColor(26,26,46);
        doc.setFont('helvetica','bold');
        doc.setFontSize(highlight?10:8.5);
        doc.text(String(value),PW-18,y+3,{align:'right'});
      }

      /* CUSTOMER DETAILS */
      var y=78;
      secHead('Customer & Booking Details',y);
      y+=17;
      var cRows=[
        ['Full Name',b.fullName],
        ['Vehicle Hired',b.carName],
        ['Booking ID',b.bookingId],
        ['Pickup Date',b.pickup],
        ['Return Date',b.endDate],
        ['Duration',a.days+' day'+(a.days>1?'s':'')]
      ];
      cRows.forEach(function(r,i){tRow(r[0],r[1],y,i%2===0,false,false);y+=11;});

      /* PAYMENT SUMMARY */
      y+=6;
      secHead('Payment Summary',y);
      y+=17;
      tRow('M-Pesa Reference',b.mpesaReceipt||'N/A',y,true,false,true);y+=11;
      tRow('Date Paid',b.paidAt||'N/A',y,false,false,false);y+=11;
      tRow('Total Rental Cost','Ksh '+a.total.toLocaleString(),y,true,false,false);y+=11;
      tRow('Deposit Paid (50%)','Ksh '+a.deposit.toLocaleString(),y,false,true,false);y+=11;
      tRow('Balance on Pickup','Ksh '+a.balance.toLocaleString(),y,true,false,false);y+=11;

      /* DIVIDER */
      y+=10;
      doc.setDrawColor(210,218,235);
      doc.setLineWidth(0.4);
      doc.line(14,y,PW-14,y);
      y+=10;

      /* SIGNATURE A */
      doc.setTextColor(140,150,170);
      doc.setFont('helvetica','normal');
      doc.setFontSize(8);
      doc.text('Authorised by',14,y);
      y+=4;

      var ox=14,oy=y,sc=0.38;
      function p(px,py){return [ox+px*sc,oy+py*sc];}

      setNavy();
      /* Bold W */
      doc.setLineWidth(0.85);
      var Wp=[[4,10],[10,34],[16,18],[22,34],[28,10]];
      for(var i=0;i<Wp.length-1;i++){
        var pa=p(Wp[i][0],Wp[i][1]),pb=p(Wp[i+1][0],Wp[i+1][1]);
        doc.line(pa[0],pa[1],pb[0],pb[1]);
      }
      /* a curves */
      doc.setLineWidth(0.65);
      var s0=p(28,10);
      doc.lines([
        [sc*(32-28),sc*(22-10),sc*(36-28),sc*(28-10),sc*(40-28),sc*(26-10)],
        [sc*(43-40),sc*(24-26),sc*(43-40),sc*(19-26),sc*(41-40),sc*(17-26)],
        [sc*(39-41),sc*(15-17),sc*(37-41),sc*(18-17),sc*(38-41),sc*(21-17)],
        [sc*(39-38),sc*(24-21),sc*(42-38),sc*(26-21),sc*(45-38),sc*(23-21)]
      ],s0[0],s0[1]);
      /* l */
      var lA=p(47,13),lB=p(47,30);
      doc.line(lA[0],lA[1],lB[0],lB[1]);
      /* dot */
      var dp=p(47,10);
      doc.setFillColor(NR,NG,NB);
      doc.circle(dp[0],dp[1],0.55,'F');
      /* o loop */
      var o0=p(50,19);
      doc.lines([
        [sc*(51-50),sc*(13-19),sc*(56-50),sc*(12-19),sc*(59-50),sc*(16-19)],
        [sc*(61-59),sc*(19-16),sc*(59-59),sc*(25-16),sc*(55-59),sc*(26-16)],
        [sc*(52-55),sc*(27-26),sc*(50-55),sc*(24-26),sc*(52-55),sc*(21-26)],
        [sc*(54-52),sc*(18-21),sc*(58-52),sc*(17-21),sc*(61-52),sc*(20-21)],
        [sc*(63-61),sc*(23-20),sc*(62-61),sc*(28-20),sc*(59-61),sc*(30-20)]
      ],o0[0],o0[1]);
      /* flourish tail */
      doc.setLineWidth(0.38);
      var tail=[[59,30],[70,26],[88,24],[105,27],[118,29],[130,27],[140,24],[145,22],[147,24]];
      for(var i=0;i<tail.length-1;i++){
        var ta=p(tail[i][0],tail[i][1]),tb=p(tail[i+1][0],tail[i+1][1]);
        doc.line(ta[0],ta[1],tb[0],tb[1]);
      }
      /* underline */
      doc.setLineWidth(0.28);
      var ul1=p(3,39),ul2=p(118,39);
      doc.line(ul1[0],ul1[1],ul2[0],ul2[1]);
      /* name */
      setNavy();
      doc.setFont('helvetica','bold');
      doc.setFontSize(9.5);
      var np=p(3,45);
      doc.text('Waliko Car Hire Ltd.',np[0],np[1]);
      doc.setTextColor(140,150,170);
      doc.setFont('helvetica','normal');
      doc.setFontSize(8);
      var tp=p(3,52);
      doc.text('Authorised Signatory',tp[0],tp[1]);



      /* FOOTER */
      doc.setFillColor(NR,NG,NB);
      doc.rect(0,PH-16,PW,16,'F');
      setWhite();
      doc.setFont('helvetica','normal');
      doc.setFontSize(8);
      doc.text('waliko.co.ke  \u00B7  info@waliko.co.ke  \u00B7  +254 700 000 000',PW/2,PH-8.5,{align:'center'});
      doc.setFontSize(6.5);
      doc.setTextColor(160,195,255);
      doc.text('This is an official computer-generated receipt and is valid without a physical stamp.',PW/2,PH-3,{align:'center'});

      return doc;
    }

    /* ─── WIRE UP BUTTONS ─── */
    document.getElementById('downloadBtn').onclick=function(){
      if(!currentBooking){alert('No booking selected.');return;}
      if(!window.jspdf){alert('PDF library not loaded yet, please wait a moment and try again.');return;}
      try{
        buildPDF(currentBooking).save('Waliko-Receipt-'+currentBooking.bookingId+'.pdf');
      }catch(e){
        alert('PDF error: '+e.message);
      }
    };

    document.getElementById('printBtn').onclick=function(){
      if(!currentBooking){alert('No booking selected.');return;}
      if(!window.jspdf){alert('PDF library not loaded yet, please wait a moment and try again.');return;}
      try{
        var blob=buildPDF(currentBooking).output('blob');
        var url=URL.createObjectURL(blob);
        var win=window.open(url,'_blank');
        if(win) win.onload=function(){win.focus();win.print();};
        else alert('Please allow popups for this site to use Print.');
      }catch(e){
        alert('Print error: '+e.message);
      }
    };

    document.getElementById('closeReceipt').onclick=function(){
      document.getElementById('receiptModal').classList.remove('open');
      currentBooking=null;
    };
    document.getElementById('receiptModal').addEventListener('click',function(e){
      if(e.target===document.getElementById('receiptModal')){
        document.getElementById('receiptModal').classList.remove('open');
        currentBooking=null;
      }
    });
    document.getElementById('logoutBtn').addEventListener('click',function(e){
      e.preventDefault();
      localStorage.removeItem('isLoggedIn');
      localStorage.removeItem('currentUser');
      window.location.href='index.html';
    });

    renderPayments();

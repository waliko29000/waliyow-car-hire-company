<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Verify Email - Waliko Car Hire</title>
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: 'Poppins', sans-serif;
      background: #f0f4ff;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .verify-box {
      background: #fff;
      padding: 32px 28px;
      border-radius: 14px;
      box-shadow: 0 3px 16px rgba(20,100,221,0.12);
      border: 1px solid rgba(20,100,221,0.08);
      width: 90%;
      max-width: 420px;
      text-align: center;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    h2 {
      color: #1464dd;
      font-size: 1.2em;
      font-weight: 700;
      margin-bottom: 8px;
    }

    p {
      color: #888;
      font-size: 0.82em;
      margin-bottom: 10px;
    }

    .email-box {
      font-weight: 700;
      color: #1464dd;
      background: #f0f4ff;
      padding: 8px 14px;
      border-radius: 8px;
      display: inline-block;
      margin-bottom: 18px;
      font-size: 0.88em;
      border: 1px solid rgba(20,100,221,0.15);
    }

    input[type="text"] {
      width: 100%;
      padding: 11px 12px;
      border: 1.5px solid #dde3f0;
      border-radius: 8px;
      text-align: center;
      font-family: 'Poppins', sans-serif;
      font-size: 1.2em;
      font-weight: 600;
      letter-spacing: 6px;
      color: #1464dd;
      outline: none;
      margin-bottom: 14px;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus {
      border-color: #1464dd;
      box-shadow: 0 0 0 3px rgba(20,100,221,0.1);
    }

    button {
      width: 100%;
      padding: 11px;
      border-radius: 8px;
      border: none;
      font-family: 'Poppins', sans-serif;
      font-weight: 600;
      font-size: 0.92em;
      cursor: pointer;
      transition: all 0.2s;
    }

    #verifyBtn {
      background: linear-gradient(135deg, #1464dd, #0d47a1);
      color: #fff;
      margin-bottom: 10px;
    }

    #verifyBtn:hover { background: linear-gradient(135deg, #0d47a1, #083080); transform: translateY(-1px); }

    #resendBtn {
      background: #f0f4ff;
      color: #1464dd;
      border: 1.5px solid #c5d5f5;
    }

    #resendBtn:hover:not(:disabled) { background: #e0eaff; }
    #resendBtn:disabled { opacity: 0.5; cursor: not-allowed; }

    #countdown {
      margin-top: 12px;
      font-size: 0.8em;
      color: #888;
    }

    .small-link {
      margin-top: 14px;
      font-size: 0.8em;
      color: #1464dd;
      display: block;
      text-decoration: underline;
      cursor: pointer;
      font-weight: 600;
    }

    @media (max-width: 480px) {
      .verify-box { padding: 24px 18px; }
      input[type="text"] { font-size: 1em; letter-spacing: 4px; }
    }
  </style>
</head>
<body>
  <div class="verify-box">
    <h2>📧 Email Verification</h2>
    <p>Enter the 6-digit code sent to:</p>
    <div class="email-box" id="userEmail">loading...</div>

    <input type="text" id="code" inputmode="numeric" maxlength="6" placeholder="_ _ _ _ _ _" />

    <button id="verifyBtn" onclick="verifyCode()">Verify</button>
    <button id="resendBtn" onclick="resendCode()">Resend Code</button>

    <div id="countdown">Checking code status...</div>
    <a class="small-link" id="backToSignup" onclick="goToSignup()" style="display:none">← Back to Sign Up</a>
  </div>

  <script>
    const EMAILJS_INIT_KEY  = "K0G-_h4Z3_5F8jOmZ";
    const EMAILJS_SERVICE   = "service_mne9prb";
    const EMAILJS_TEMPLATE  = "template_5bztsmi";

    let countdownInterval = null;
    let resendCooldownTimer = null;

    document.addEventListener("DOMContentLoaded", () => {
      emailjs.init(EMAILJS_INIT_KEY);

      const storedEmail = localStorage.getItem("userEmail");
      if (!storedEmail) {
        document.getElementById("userEmail").textContent = "No email found";
        document.getElementById("countdown").textContent = "No verification in progress. Please sign up first.";
        document.getElementById("resendBtn").disabled = true;
        document.getElementById("backToSignup").style.display = "block";
        return;
      }

      document.getElementById("userEmail").textContent = storedEmail;
      startCountdown();
    });

    function goToSignup() {
      window.location.href = "signup.html";
    }

    function startCountdown() {
      clearInterval(countdownInterval);
      const expiry = localStorage.getItem("verificationExpiry");
      if (!expiry) {
        document.getElementById("countdown").textContent = "No active code. Click Resend to get a new code.";
        return;
      }

      countdownInterval = setInterval(() => {
        const msLeft = parseInt(expiry, 10) - Date.now();
        if (msLeft <= 0) {
          clearInterval(countdownInterval);
          document.getElementById("countdown").textContent = "⏰ Code expired. Click Resend.";
          document.getElementById("resendBtn").disabled = false;
          return;
        }
        const m = Math.floor(msLeft / 60000);
        const s = Math.floor((msLeft % 60000) / 1000);
        document.getElementById("countdown").textContent = `⏳ Code expires in ${m}:${String(s).padStart(2,"0")}`;
      }, 1000);
    }

    function verifyCode() {
      const enteredCode = document.getElementById("code").value.trim();
      const savedCode   = localStorage.getItem("verificationCode");
      const expiry      = localStorage.getItem("verificationExpiry");
      const email       = localStorage.getItem("userEmail");

      if (!enteredCode || !savedCode || !expiry) {
        alert("❌ No active verification code. Please click Resend.");
        return;
      }

      if (Date.now() > parseInt(expiry, 10)) {
        alert("⏰ Code expired. Please click Resend.");
        return;
      }

      if (enteredCode === savedCode) {
        let allUsers = JSON.parse(localStorage.getItem("allUsers")) || [];
        allUsers = allUsers.map(u => u.email === email ? { ...u, isVerified: true } : u);
        localStorage.setItem("allUsers", JSON.stringify(allUsers));

        localStorage.removeItem("verificationCode");
        localStorage.removeItem("verificationExpiry");
        localStorage.removeItem("userEmail");

        alert("✅ Verification successful!");
        setTimeout(() => window.location.href = "signin.html", 600);
      } else {
        alert("❌ Incorrect code. Please try again.");
      }
    }

    function resendCode() {
      const email = localStorage.getItem("userEmail");
      if (!email) { alert("❌ No email found."); return; }

      const resendBtn = document.getElementById("resendBtn");
      resendBtn.disabled = true;

      const newCode   = String(Math.floor(100000 + Math.random() * 900000));
      const newExpiry = Date.now() + 5 * 60 * 1000;

      localStorage.setItem("verificationCode", newCode);
      localStorage.setItem("verificationExpiry", String(newExpiry));

      startCountdown();

      emailjs.send(EMAILJS_SERVICE, EMAILJS_TEMPLATE, {
        to_email: email,
        verification_code: newCode,
        from_name: "Waliko Car Hire",
        reply_to: email
      })
      .then(() => { alert("✅ Verification code sent."); })
      .catch((err) => { alert("❌ Failed to resend email. Check console."); console.error(err); });

      let cooldown = 30;
      resendBtn.textContent = `Resend (${cooldown}s)`;
      resendCooldownTimer = setInterval(() => {
        cooldown--;
        resendBtn.textContent = `Resend (${cooldown}s)`;
        if (cooldown <= 0) {
          clearInterval(resendCooldownTimer);
          resendBtn.textContent = "Resend Code";
          resendBtn.disabled = false;
        }
      }, 1000);
    }
  </script>
</body>
</html>

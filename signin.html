<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login - Waliko Car Hire</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: 'Poppins', sans-serif;
      background: #f0f4ff;
    }

    .container {
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding-top: 30px;
      position: relative;
    }

    .wrapper {
      position: relative;
      background: #fff;
      padding: 28px 24px;
      border-radius: 14px;
      box-shadow: 0 3px 16px rgba(20,100,221,0.12);
      border: 1px solid rgba(20,100,221,0.08);
      width: 90%;
      max-width: 370px;
      overflow: hidden;
    }

    /* LED border animation */
    .wrapper::before {
      content: "";
      position: absolute;
      top: -2px;
      left: -2px;
      right: -2px;
      bottom: -2px;
      background: linear-gradient(90deg, red, yellow, lime, cyan, blue, magenta, red);
      background-size: 400%;
      z-index: -1;
      filter: blur(3px);
      animation: moveLights 5s linear infinite;
      border-radius: 16px;
    }

    @keyframes moveLights {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    h1 {
      text-align: center;
      color: #1464dd;
      margin-bottom: 6px;
      font-size: 1.2em;
      font-weight: 700;
    }

    p {
      text-align: center;
      color: #888;
      font-size: 0.8em;
      margin-bottom: 18px;
    }

    label {
      display: block;
      margin-top: 12px;
      margin-bottom: 4px;
      font-size: 0.8em;
      font-weight: 600;
      color: #444;
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 9px 12px;
      border: 1.5px solid #dde3f0;
      border-radius: 8px;
      font-family: 'Poppins', sans-serif;
      font-size: 0.88em;
      outline: none;
      transition: border-color 0.2s;
      color: #333;
    }

    input[type="email"]:focus,
    input[type="password"]:focus {
      border-color: #1464dd;
      box-shadow: 0 0 0 3px rgba(20,100,221,0.1);
    }

    input[type="submit"] {
      width: 100%;
      padding: 11px;
      background: linear-gradient(135deg, #1464dd, #0d47a1);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: 'Poppins', sans-serif;
      font-weight: 600;
      font-size: 0.92em;
      margin-top: 16px;
      cursor: pointer;
      transition: all 0.2s;
    }

    input[type="submit"]:hover {
      background: linear-gradient(135deg, #0d47a1, #083080);
      transform: translateY(-1px);
    }

    .register-link,
    .forgot-link {
      text-align: center;
      margin-top: 10px;
      font-size: 0.8em;
      color: #888;
    }

    a {
      color: #1464dd;
      text-decoration: none;
      font-weight: 600;
    }

    a:hover {
      text-decoration: underline;
    }

    #padlock {
      font-size: 40px;
      text-align: center;
      margin-top: 16px;
    }

    @keyframes shake {
      0%   { transform: translateX(0); }
      25%  { transform: translateX(-10px); }
      50%  { transform: translateX(10px); }
      75%  { transform: translateX(-10px); }
      100% { transform: translateX(0); }
    }

    .shake {
      animation: shake 0.5s ease-in-out;
    }

    /* Modal styling */
    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      overflow: auto;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(4px);
    }

    .modal-content {
      background: #fff;
      margin: 10% auto;
      padding: 24px;
      width: 90%;
      max-width: 400px;
      border-radius: 14px;
      position: relative;
      box-shadow: 0 8px 30px rgba(0,0,0,0.2);
      animation: fadeIn 0.3s;
      border: 1px solid rgba(20,100,221,0.08);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
      padding-bottom: 10px;
      border-bottom: 2px solid #f0f4ff;
    }

    .modal-header h2 {
      margin: 0;
      font-size: 1em;
      font-weight: 700;
      color: #1464dd;
    }

    .close-button {
      color: #aaa;
      font-size: 22px;
      font-weight: bold;
      position: absolute;
      top: 12px;
      right: 16px;
      cursor: pointer;
      background: #f0f4ff;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }

    .close-button:hover { background: #dde3f0; color: #1464dd; }

    .modal-body {
      margin-bottom: 16px;
      font-size: 0.88em;
      color: #555;
      line-height: 1.7;
    }

    .modal-footer {
      text-align: right;
    }

    .modal-footer a {
      background: linear-gradient(135deg, #1464dd, #0d47a1);
      color: #fff;
      padding: 9px 18px;
      border-radius: 8px;
      cursor: pointer;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.88em;
      transition: all 0.2s;
    }

    .modal-footer a:hover {
      background: linear-gradient(135deg, #0d47a1, #083080);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="wrapper">
      <form onsubmit="handleLogin(event)">
        <h1>Welcome Back🤝</h1>
        <p>Enter your email and password to login</p>

        <label for="email">Email</label>
        <input type="email" id="email" required placeholder="Enter your email">

        <label for="password">Password</label>
        <input type="password" id="password" required placeholder="Enter password">

        <input type="submit" value="Login">

        <div class="forgot-link">
          <p><a href="forget password.html">Forgot Password?</a></p>
        </div>

        <div class="register-link">
          <p>Don't have an account? <a href="signup.html">Register</a></p>
        </div>
      </form>
      <div id="padlock">🔒</div>
    </div>
  </div>

  <div id="suspensionModal" class="modal">
    <div class="modal-content">
      <span class="close-button" id="modalCloseBtn">&times;</span>
      <div class="modal-header">
        <h2>Account Deactivated</h2>
      </div>
      <div class="modal-body">
        <p id="suspensionMessage">Your account is deactivated. Please contact support.</p>
        <p>Click the button below to appeal the deactivation.</p>
      </div>
      <div class="modal-footer">
        <a href="APPEAL.HTML">Appeal Deactivation</a>
      </div>
    </div>
  </div>

  <script>
    const modal = document.getElementById("suspensionModal");
    const modalCloseBtn = document.getElementById("modalCloseBtn");

    modalCloseBtn.onclick = function() {
      modal.style.display = "none";
      window.location.href = "index.html";
    }

    window.onclick = function(event) {
      if (event.target === modal) {
        modal.style.display = "none";
        window.location.href = "index.html";
      }
    }

    function handleLogin(event) {
      event.preventDefault();

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();
      const padlock = document.getElementById('padlock');
      padlock.classList.remove('shake');

      const suspendedEmail = localStorage.getItem('suspendedEmail');
      const suspendedPassword = localStorage.getItem('suspendedPassword');
      const deactivationTime = localStorage.getItem('deactivationTime');

      if (suspendedEmail && suspendedPassword && suspendedEmail === email && suspendedPassword === password) {
        const suspensionMessage = document.getElementById("suspensionMessage");
        suspensionMessage.textContent = "Your account is deactivated for: " + deactivationTime + ".";
        modal.style.display = "block";
        padlock.textContent = "🔒";
        padlock.classList.add('shake');
        return;
      }

      const allUsers = JSON.parse(localStorage.getItem("allUsers")) || [];
      const matchingUser = allUsers.find(user => user.email === email && user.password === password);

      if (matchingUser) {
        if (matchingUser.hasOwnProperty("isVerified") && !matchingUser.isVerified) {
          alert("⚠️ Please verify your email before logging in.");
          localStorage.setItem("userEmail", email);
          window.location.href = "verify.html";
          padlock.textContent = "🔒";
          padlock.classList.add('shake');
          return;
        }

        localStorage.setItem("currentUser", JSON.stringify(matchingUser));
        localStorage.setItem("userEmail", email);
        localStorage.setItem("userPassword", password);
        localStorage.setItem("isLoggedIn", "true");

        padlock.textContent = "🔓";
        setTimeout(() => {
          window.location.href = "car-available.html";
        }, 500);

      } else {
        alert("❌ Invalid email or password. Please try again.");
        padlock.textContent = "🔒";
        padlock.classList.add('shake');
      }
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Change Password - Waliko Car Hire</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: 'Poppins', sans-serif;
      background: #f0f4ff;
      color: #333;
    }

    /* ── HEADER ── */
    header {
      background: linear-gradient(135deg, #1464dd, #0d47a1);
      color: #fff;
      padding: 10px 20px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 3px 15px rgba(20,100,221,0.35);
    }

    header h1 { font-size: 1.2em; font-weight: 700; }

    nav { display: flex; flex-wrap: wrap; gap: 6px; }

    nav a {
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.25);
      color: #fff;
      padding: 7px 13px;
      border-radius: 25px;
      font-size: 0.78em;
      font-weight: 500;
      text-decoration: none;
      transition: all 0.2s;
    }

    nav a:hover { background: rgba(255,255,255,0.3); border-color: rgba(255,255,255,0.6); }
    nav a.logout { border-color: rgba(255,100,100,0.4); color: #ffaaaa; }
    nav a.logout:hover { background: rgba(255,80,80,0.2); }

    /* ── MAIN ── */
    main {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 28px 16px 40px;
    }

    .container {
      background: #fff;
      padding: 28px 24px;
      border-radius: 14px;
      box-shadow: 0 3px 16px rgba(20,100,221,0.09);
      border: 1px solid rgba(20,100,221,0.07);
      width: 100%;
      max-width: 480px;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
      color: #1464dd;
      font-size: 1.1em;
      font-weight: 700;
      padding-bottom: 12px;
      border-bottom: 2px solid #f0f4ff;
    }

    .form-group { margin-bottom: 14px; }

    label {
      display: block;
      margin-bottom: 4px;
      font-size: 0.8em;
      font-weight: 600;
      color: #444;
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 9px 12px;
      border: 1.5px solid #dde3f0;
      border-radius: 8px;
      font-family: 'Poppins', sans-serif;
      font-size: 0.88em;
      outline: none;
      transition: border-color 0.2s;
      color: #333;
    }

    input[type="email"]:focus,
    input[type="password"]:focus {
      border-color: #1464dd;
      box-shadow: 0 0 0 3px rgba(20,100,221,0.1);
    }

    input[type="email"]::placeholder,
    input[type="password"]::placeholder {
      font-size: 0.85em;
      color: #aaa;
    }

    button {
      background: linear-gradient(135deg, #1464dd, #0d47a1);
      color: #fff;
      border: none;
      padding: 11px;
      border-radius: 8px;
      cursor: pointer;
      font-family: 'Poppins', sans-serif;
      font-size: 0.92em;
      font-weight: 600;
      transition: all 0.2s;
      width: 100%;
      margin-top: 4px;
    }

    button:hover {
      background: linear-gradient(135deg, #0d47a1, #083080);
      transform: translateY(-1px);
    }

    .error-message {
      color: #e74c3c;
      font-size: 0.78em;
      margin-top: 4px;
    }

    .success-message {
      background: #e6f9ee;
      border: 1px solid #a8ddb9;
      border-left: 4px solid #27ae60;
      border-radius: 8px;
      color: #1e8449;
      font-size: 0.88em;
      margin-top: 14px;
      padding: 10px 14px;
      text-align: center;
    }

    @media (max-width: 600px) {
      header { flex-direction: column; align-items: flex-start; gap: 8px; }
      header h1 { font-size: 1em; }
      nav a { font-size: 0.7em; padding: 6px 10px; }
      .container { padding: 20px 16px; }
    }
  </style>
</head>
<body>

  <header>
    <h1 style="color: white;">🚗 Waliko Car Hire</h1>
    <nav>
      <a href="car-available.html">Home</a>
      <a href="account.html">Settings</a>
      <a href="index.html" class="logout" id="logoutBtn">Logout</a>
    </nav>
  </header>

  <main>
    <div class="container">
      <h1>Change Password</h1>
      <form id="changePasswordForm">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="Enter your email" required>
          <div id="email-error" class="error-message" style="display:none;"></div>
        </div>
        <div class="form-group">
          <label for="oldPassword">Previous Password</label>
          <input type="password" id="oldPassword" name="oldPassword" placeholder="Enter your previous password" required>
          <div id="oldPassword-error" class="error-message" style="display:none;"></div>
        </div>
        <div class="form-group">
          <label for="newPassword">New Password</label>
          <input type="password" id="newPassword" name="newPassword" placeholder="Enter your new password" required>
          <div id="newPassword-error" class="error-message" style="display:none;"></div>
        </div>
        <div class="form-group">
          <label for="confirmPassword">Confirm New Password</label>
          <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm your new password" required>
          <div id="confirmPassword-error" class="error-message" style="display:none;"></div>
        </div>
        <button type="submit">Change Password</button>
        <div id="form-error" class="error-message" style="display:none; margin-top:10px;"></div>
        <div id="success-message" class="success-message" style="display:none;"></div>
      </form>
    </div>
  </main>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const changePasswordForm      = document.getElementById('changePasswordForm');
      const emailInput              = document.getElementById('email');
      const oldPasswordInput        = document.getElementById('oldPassword');
      const newPasswordInput        = document.getElementById('newPassword');
      const confirmPasswordInput    = document.getElementById('confirmPassword');
      const formError               = document.getElementById('form-error');
      const successMessageDiv       = document.getElementById('success-message');
      const emailErrorDiv           = document.getElementById('email-error');
      const oldPasswordErrorDiv     = document.getElementById('oldPassword-error');
      const newPasswordErrorDiv     = document.getElementById('newPassword-error');
      const confirmPasswordErrorDiv = document.getElementById('confirmPassword-error');

      changePasswordForm.addEventListener('submit', (event) => {
        event.preventDefault();
        formError.style.display = 'none';
        successMessageDiv.style.display = 'none';
        emailErrorDiv.style.display = 'none';
        oldPasswordErrorDiv.style.display = 'none';
        newPasswordErrorDiv.style.display = 'none';
        confirmPasswordErrorDiv.style.display = 'none';

        const enteredEmail           = emailInput.value.trim();
        const enteredOldPassword     = oldPasswordInput.value.trim();
        const enteredNewPassword     = newPasswordInput.value.trim();
        const enteredConfirmPassword = confirmPasswordInput.value.trim();

        let hasErrors = false;

        if (!enteredEmail) {
          emailErrorDiv.textContent = "Please enter your email address.";
          emailErrorDiv.style.display = 'block'; hasErrors = true;
        }
        if (!enteredOldPassword) {
          oldPasswordErrorDiv.textContent = "Please enter your previous password.";
          oldPasswordErrorDiv.style.display = 'block'; hasErrors = true;
        }
        if (!enteredNewPassword) {
          newPasswordErrorDiv.textContent = "Please enter your new password.";
          newPasswordErrorDiv.style.display = 'block'; hasErrors = true;
        }
        if (!enteredConfirmPassword) {
          confirmPasswordErrorDiv.textContent = "Please confirm your new password.";
          confirmPasswordErrorDiv.style.display = 'block'; hasErrors = true;
        }
        if (enteredNewPassword !== enteredConfirmPassword) {
          confirmPasswordErrorDiv.textContent = "New password and confirmation do not match.";
          confirmPasswordErrorDiv.style.display = 'block'; hasErrors = true;
        }
        if (hasErrors) return;

        const storedUser = localStorage.getItem('currentUser');
        if (!storedUser) {
          formError.textContent = "You must be logged in to change your password.";
          formError.style.display = 'block'; return;
        }

        try {
          const user = JSON.parse(storedUser);

          if (enteredEmail === user.email && enteredOldPassword === user.password) {
            if (enteredNewPassword === enteredOldPassword) {
              formError.textContent = "New password cannot be the same as the old password.";
              formError.style.display = 'block'; return;
            }

            user.password = enteredNewPassword;
            localStorage.setItem('currentUser', JSON.stringify(user));

            let allUsers = JSON.parse(localStorage.getItem('allUsers')) || [];
            const idx = allUsers.findIndex(u => u.email === user.email);
            if (idx > -1) {
              allUsers[idx].password = enteredNewPassword;
              localStorage.setItem('allUsers', JSON.stringify(allUsers));
            }
            localStorage.setItem('userPassword', enteredNewPassword);

            successMessageDiv.textContent = "✅ Password changed successfully!";
            successMessageDiv.style.display = 'block';
            setTimeout(() => { window.location.href = 'account.html'; }, 2500);

          } else {
            formError.textContent = "Incorrect email or previous password. Please try again.";
            formError.style.display = 'block';
          }
        } catch (error) {
          formError.textContent = "Error: Could not retrieve user data. Please log in again.";
          formError.style.display = 'block';
        }
      });

      document.getElementById('logoutBtn').addEventListener('click', e => {
        e.preventDefault();
        localStorage.removeItem('isLoggedIn');
        localStorage.removeItem('currentUser');
        window.location.href = 'index.html';
      });
    });
  </script>

</body>
</html>
